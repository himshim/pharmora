<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Resource | Pharmora
</title>


<link
rel="icon"
href="../assets/branding/favicon.svg">


<link
rel="stylesheet"
href="../css/pharmora.css">


</head>



<body>


<div id="site-header"></div>




<main>


<section class="container section">


<div

class="card glass"

id="resource-view">


Loading resource...


</div>


</section>


</main>






<div id="site-footer"></div>






<script src="../js/pharmora.js"></script>







<script>



function icon(type){



return {


resources:"📚",

books:"📖",

events:"📅",

tools:"🧰",

"teaching-materials":"👨‍🏫",

"question-bank":"❓",

assignments:"📝"



}[type] || "📄";



}









async function resolveName(

collection,

id

){



if(!id){

return "";

}




let data =

await getRecords(collection);




let item =

data.find(

x =>

x.id === id

||

x.refId === id

||

x.publicId === id

);





return item

?

(

item.name ||

item.title ||

item.code ||

""

)

:

"";



}









async function loadResource(){





let params =

new URLSearchParams(

location.search

);





let id =

params.get("id");




let collection =

params.get("type")

||

"resources";







let items =

await getRecords(

collection

);







let item =

items.find(

x =>

x.id === id

||

x.refId === id

||

x.publicId === id

);







let box =

document.getElementById(

"resource-view"

);






if(!item){



box.innerHTML = `


<h1>

Content Not Found

</h1>


<p>

This resource may have been removed
or is unavailable.

</p>


`;



return;



}








if(

item.status

&&

item.status !== "approved"

){



box.innerHTML = `


<h1>

⏳ Awaiting Review

</h1>


<p>

This contribution is waiting for approval.

</p>


`;



return;



}










let title =

item.title

||

item.question

||

item.name

||

"Untitled";






let description =

item.description

||

item.instructions

||

item.answer

||

"";









let viewKey =

"viewed_" +

collection +

"_" +

id;






let newView =

!sessionStorage.getItem(

viewKey

);






let views =

(item.stats?.views || 0)

+

(

newView ? 1 : 0

);






if(newView){



sessionStorage.setItem(

viewKey,

"true"

);



await updateRecord(

collection,

item.id,

{


stats:{


...(item.stats || {}),


views:views


}


}

);



}









if(

typeof trackEvent === "function"

){



trackEvent(

"view",

title

);



}









let course =

await resolveName(

"courses",

item.course

);





let curriculum =

await resolveName(

"curriculums",

item.curriculum

);





let semester =

await resolveName(

"semesters",

item.semester

);





let subject =

await resolveName(

"subjects",

item.subject

);





let unit =

await resolveName(

"units",

item.unit

);









box.innerHTML = `




<span class="badge">

${icon(collection)}

${collection}

</span>




<br><br>





<h1>

${title}

</h1>






<p>

${description}

</p>








<div class="grid">






<div class="card">


<h3>

📘 Academic Details

</h3>



<p>


${course ? "🎓 "+course+"<br>" : ""}

${curriculum ? "📚 "+curriculum+"<br>" : ""}

${semester ? "📅 "+semester+"<br>" : ""}

${subject ? "🧪 "+subject+"<br>" : ""}

${unit ? "📄 "+unit+"<br>" : ""}


</p>



</div>










<div class="card">



<h3>

ℹ Resource Details

</h3>



<p>


${item.author?.name ? "👤 "+item.author.name+"<br>" : ""}


${item.resourceType ? "📂 "+item.resourceType+"<br>" : ""}


${item.materialType ? "👨‍🏫 "+item.materialType+"<br>" : ""}


${item.questionType ? "❓ "+item.questionType+"<br>" : ""}


${item.difficulty ? "⭐ "+item.difficulty+"<br>" : ""}


${item.publisher ? "🏢 "+item.publisher+"<br>" : ""}


${item.edition ? "📕 "+item.edition+"<br>" : ""}


${item.isbn ? "🔢 "+item.isbn+"<br>" : ""}


</p>



</div>








</div>









<br>






<div class="card">



<h3>

📊 Statistics

</h3>



<p>

👁 ${views} views


</p>




</div>







<br>








${

item.content?.link

||

item.link

?


`

<button

class="btn btn-primary"

onclick="openContent()">


Open Resource


</button>

`

:

""

}




`;









window.openContent = async function(){






await updateRecord(

collection,

item.id,

{


stats:{



...(item.stats || {}),



views:views,



downloads:

(item.stats?.downloads || 0)

+

1



}



}

);








if(

typeof trackEvent === "function"

){



trackEvent(

"download",

title

);



}








window.open(

item.content?.link

||

item.link,

"_blank"

);



};






}









window.addEventListener(

"pharmora-ready",

loadResource

);



</script>





</body>


</html>
