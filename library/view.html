<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Resource

</title>


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">


</head>




<body>


<div id="site-header"></div>





<main class="container section">


<div

class="card"

id="resource-view">


Loading...


</div>


</main>






<div id="site-footer"></div>






<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>



<script src="../js/services/database.service.js"></script>




<script>


async function loadResource(){





let params =

new URLSearchParams(

location.search

);




let id =

params.get(

"id"

);



let collection =

params.get(

"type"

)

||

"resources";






let items =

await getRecords(

collection

);





let item =

items.find(

x=>x.id===id

);







let box =

document.getElementById(

"resource-view"

);







if(!item){



box.innerHTML=

"Resource not found";



return;



}








let views =

(item.stats?.views || 0)

+

1;








await updateRecord(

collection,

id,

{

stats:{

...(item.stats || {}),

views:views

}

}

);









box.innerHTML = `





<h1>

${item.title}

</h1>





<p>

${item.description || ""}

</p>






<br>





<p>


🎓 ${(item.courses || []).join(", ")}


<br>


🧪 ${(item.subjects || []).join(", ")}


<br>


🏷 ${(item.tags || []).join(", ")}


</p>






<br>





<p>


👁 ${views} views


</p>






${

item.content?.link

?

`

<button

class="btn btn-primary"

onclick="openContent()">

Open Content

</button>

`

:

""

}





`;







window.openContent = async function(){






await updateRecord(

collection,

id,

{

stats:{


...(item.stats || {}),


views:views,


downloads:

(item.stats?.downloads || 0)+1


}


}

);







window.open(

item.content.link,

"_blank"

);






};






}






loadResource();


</script>




<script src="../js/app.js"></script>


</body>


</html>
