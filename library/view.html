<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Resource

</title>


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">


</head>




<body>


<div id="site-header"></div>





<main class="container section">


<div
class="card"
id="resource-view">


Loading...


</div>


</main>





<div id="site-footer"></div>







<script src="../js/app.js"></script>


<script src="../js/services/database.service.js"></script>


<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>









<script>


async function resolveName(
collection,
id
){



if(!id){

return "";

}




let data =
await getRecords(
collection
);



let item =
data.find(
x=>x.id===id
);



return item

?

(

item.name ||

item.title ||

item.code

)

:

"";



}









async function loadResource(){





let params =
new URLSearchParams(
location.search
);




let id =
params.get(
"id"
);



let collection =
params.get(
"type"
)

||

"resources";






let items =
await getRecords(
collection
);




let item =
items.find(

x=>x.id===id

);






let box =
document.getElementById(
"resource-view"
);







if(!item){



box.innerHTML=`

<h2>

Resource not found

</h2>

`;



return;



}








if(

item.status

&&

item.status!=="approved"

){



box.innerHTML=`

<h2>

Content under review

</h2>

`;



return;



}









let views =

(item.stats?.views || 0)

+

1;







await updateRecord(

collection,

id,

{

stats:{

...(item.stats || {}),

views:views

}

}

);










let course =
await resolveName(
"courses",
item.course
);


let curriculum =
await resolveName(
"curriculums",
item.curriculum
);


let semester =
await resolveName(
"semesters",
item.semester
);


let subject =
await resolveName(
"subjects",
item.subject
);


let unit =
await resolveName(
"units",
item.unit
);










box.innerHTML=`



<h1>

${item.title}

</h1>





<p>

${item.description || ""}

</p>





<br>





<p>


${course ? "🎓 "+course+"<br>" : ""}

${curriculum ? "📘 "+curriculum+"<br>" : ""}

${semester ? "📅 "+semester+"<br>" : ""}

${subject ? "🧪 "+subject+"<br>" : ""}

${unit ? "📄 "+unit+"<br>" : ""}


${

(item.tags || []).length

?

"🏷 "+item.tags.join(", ")

:

""

}


</p>







<br>





<p>

👁 ${views} views

</p>







${

item.content?.link

?

`

<button

class="btn btn-primary"

onclick="openContent()">

Open Link

</button>

`

:

""

}





${

item.content?.file

?

`

<br><br>


<div class="badge">

📎 ${item.content.file.name}

</div>

`

:

""

}




`;









window.openContent = async function(){






await updateRecord(

collection,

id,

{

stats:{

...(item.stats || {}),

views:views,

downloads:

(item.stats?.downloads || 0)

+

1

}

}

);







window.open(

item.content.link,

"_blank"

);



};




}







loadResource();


</script>




</body>


</html>
