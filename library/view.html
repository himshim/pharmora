<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Content | Pharmora
</title>


<link rel="icon" href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">


<style>


.meta{

line-height:2;

margin-top:20px;

}


.action-box{

margin-top:30px;

display:flex;

gap:15px;

flex-wrap:wrap;

}


</style>


</head>



<body>


<div id="site-header"></div>




<main class="container section">


<div
class="card"
id="resource-view">


Loading...


</div>


</main>





<div id="site-footer"></div>






<!-- CORE -->
<script src="/js/pharmora.js"></script>

<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>







<script>


function icon(type){


return {

resources:"📚",

books:"📖",

events:"📅",

tools:"🧰",

"teaching-materials":"👨‍🏫",

"question-bank":"❓",

assignments:"📝"


}[type] || "📄";


}







async function resolveName(
collection,
id
){



if(!id){

return "";

}



let data =
await getRecords(
collection
);



let item =
data.find(
x=>x.id===id
);



return item

?

(

item.name ||

item.title ||

item.code ||

""

)

:

"";


}









async function loadResource(){



let params =
new URLSearchParams(
location.search
);



let id =
params.get(
"id"
);



let collection =
params.get(
"type"
)

||

"resources";








let items =
await getRecords(
collection
);



let item =
items.find(
x=>x.id===id
);




let box =
document.getElementById(
"resource-view"
);







if(!item){


box.innerHTML=

"<h2>Content not found</h2>";


return;


}








if(

item.status

&&

item.status!=="approved"

){


box.innerHTML=

"<h2>⏳ Content awaiting review</h2>";


return;


}









let viewKey =

"viewed_" +

collection +

"_" +

id;



let newView =

!sessionStorage.getItem(

viewKey

);



let views =

(item.stats?.views || 0)

+

(

newView ? 1 : 0

);




if(newView){


sessionStorage.setItem(

viewKey,

"true"

);


}







await updateRecord(

collection,

id,

{

stats:{

...(item.stats || {}),

views:views

}

}

);


if(

typeof trackEvent==="function"

){


trackEvent(

"view",

title

);


}






let course =
await resolveName(
"courses",
item.course
);



let curriculum =
await resolveName(
"curriculums",
item.curriculum
);



let semester =
await resolveName(
"semesters",
item.semester
);



let subject =
await resolveName(
"subjects",
item.subject
);



let unit =
await resolveName(
"units",
item.unit
);








let title =

item.title ||

item.question ||

item.name ||

"Untitled";






let description =

item.description ||

item.instructions ||

item.answer ||

"";








box.innerHTML = `



<div class="badge">

${icon(collection)}

${collection}

</div>




<br><br>




<h1>

${title}

</h1>





<p>

${description}

</p>







<div class="meta">



${item.author?.name ? "👤 "+item.author.name+"<br>" : ""}



${item.resourceType ? "📂 Type: "+item.resourceType+"<br>" : ""}


${item.materialType ? "👨‍🏫 Material: "+item.materialType+"<br>" : ""}


${item.questionType ? "❓ Question: "+item.questionType+"<br>" : ""}


${item.difficulty ? "⭐ Difficulty: "+item.difficulty+"<br>" : ""}



${item.publisher ? "🏢 Publisher: "+item.publisher+"<br>" : ""}


${item.edition ? "📕 Edition: "+item.edition+"<br>" : ""}


${item.isbn ? "🔢 ISBN: "+item.isbn+"<br>" : ""}






${course ? "🎓 "+course+"<br>" : ""}

${curriculum ? "📘 "+curriculum+"<br>" : ""}

${semester ? "📅 "+semester+"<br>" : ""}

${subject ? "🧪 "+subject+"<br>" : ""}

${unit ? "📄 "+unit+"<br>" : ""}







${

(item.tags || []).length

?

"🏷 "+item.tags.join(", ")

:

""

}




</div>







<br>


<p>

👁 ${views} views

</p>









<div class="action-box">



${

item.content?.link || item.link

?

`

<button

class="btn btn-primary"

onclick="openContent()">


Open Resource


</button>

`

:

""

}




${

item.content?.file

?

`

<div class="badge">

📎 ${item.content.file.name}

</div>

`

:

""

}



</div>


`;









window.openContent = async function(){





await updateRecord(

collection,

id,

{

stats:{

...(item.stats || {}),

views:views,

downloads:

(item.stats?.downloads || 0)

+

1

}

}

);

if(

typeof trackEvent==="function"

){



trackEvent(

"download",

title

);



}






window.open(

item.content?.link ||

item.link,

"_blank"

);



};



}









loadResource();



</script>



</body>

</html>
