<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Editor | Pharmora
</title>


<link rel="stylesheet" href="/css/pharmora.css">


<style>

.editor-box {
  max-width: 800px;
  margin: 30px auto;
  padding: 40px;
  background: rgba(15, 23, 42, 0.85);
  border: 1px solid var(--border);
  border-radius: var(--radius-medium);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
}

.editor-box h1 {
  font-size: 2.2rem;
  font-weight: 800;
  margin-bottom: 10px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

input,
textarea,
select {
  width: 100%;
  padding: 16px;
  margin-bottom: 18px;
  border-radius: var(--radius-sm);
  background: var(--surface-light);
  color: var(--text);
  border: 1px solid var(--border);
  outline: none;
  font-size: 0.95rem;
  transition: var(--transition);
}

input:focus,
textarea:focus,
select:focus {
  border-color: var(--primary);
  box-shadow: var(--focus);
  background: var(--surface);
}

input[type="checkbox"] {
  width: auto;
  margin-right: 12px;
  cursor: pointer;
}

label {
  display: block;
  font-weight: 600;
  color: var(--text-soft);
  margin-top: 20px;
  margin-bottom: 8px;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

textarea {
  min-height: 150px;
  resize: vertical;
}

.history-item {
  padding: 16px;
  margin-bottom: 12px;
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border);
  transition: var(--transition);
}

.history-item:hover {
  background: rgba(255, 255, 255, 0.04);
}

.history-item b {
  color: var(--secondary);
}

</style>


</head>



<body>


<div id="site-header"></div>


<main
class="container section"
data-requires="editor">


<div
id="editor-root"
class="card editor-box">

Loading editor...

</div>


</main>


<div id="site-footer"></div>



<script src="/js/pharmora.js"></script>



<script>


let editingEntity=null;

let editingCollection=null;



window.addEventListener(
"pharmora-ready",
initEditor
);




async function initEditor(){


let root =
document.getElementById(
"editor-root"
);


let params =
new URLSearchParams(
location.search
);


let id =
params.get("id");


let collection =
params.get("collection")
||
params.get("type");



if(
!id ||
!collection
){


root.innerHTML = `

<h2>
Invalid editor link
</h2>

<p>
Missing collection or id.
</p>

`;


return;


}



editingCollection =
collection;

let blocked=[

"profiles",
"users",
"accounts"

];


if(
blocked.includes(collection)
){


root.innerHTML=`

<h2>
Use Profile Settings
</h2>

<p>
This editor is only for content.
</p>

`;


return;


}

let entity =
await loadEditableEntity(
collection,
id
);



if(!entity){


root.innerHTML=

`
<h2>
Content not found
</h2>
`;

return;

}




if(
!(await canEditEntity(entity))
){


root.innerHTML=

`
<h2>
Access denied
</h2>

<p>
You cannot edit this item.
</p>
`;

return;

}



editingEntity =
entity;



renderEditor(entity);


}



function renderDynamicField(field){


let config =
typeof fieldConfig==="function"
?
fieldConfig(field.key)
:
{
label:field.key,
type:"auto"
};


let value =
field.value ?? "";



  /*
   REFERENCE
  */
  if(
  config.type==="reference"
  ){
    let selectId = "ref-" + field.key + "-" + Math.random().toString(36).substring(2,8);
    setTimeout(async ()=>{
      let selectEl = document.getElementById(selectId);
      if(!selectEl){ return; }
      try{
        if(typeof getRecords === "function"){
          let records = await getRecords(config.collection);
          records.forEach(item=>{
            let option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.name || item.title || item.code || item.id;
            if(item.id === value){
              option.selected=true;
            }
            selectEl.appendChild(option);
          });
        }
      }catch(e){
        console.warn("Reference load failed:", config.collection, e);
      }
    }, 50);

    return `
    <label>
    ${config.label}
    </label>
    <select
    id="${selectId}"
    data-field="${field.key}"
    data-type="string"
    >
    <option value="">Select ${config.label}</option>
    </select>
    `;
  }


  /*
   TEXTAREA
  */

if(
config.type==="textarea"
){

return `

<label>
${config.label}
</label>

<textarea
data-field="${field.key}"
data-type="string"
>${value}</textarea>

`;

}



/*
 SELECT
*/

if(
config.type==="select"
){

return `

<label>
${config.label}
</label>

<select
data-field="${field.key}"
data-type="string"
>

${

(config.options || [])

.map(x=>`

<option
value="${x}"
${x===value?"selected":""}
>
${x}
</option>

`)
.join("")

}

${
config.allowCustom
?
`
<option value="${value}">
${value}
</option>
`
:
""
}

</select>

`;

}





/*
 MULTI SELECT
*/

if(
config.type==="multi-select"
){


let selected =
Array.isArray(value)
?
value
:
[];


let custom =
selected.filter(
x=>
!(config.options||[])
.includes(x)
);


return `

<label>
${config.label}
</label>


${

(config.options||[])

.map(x=>`

<label>

<input

type="checkbox"

data-field="${field.key}"

data-type="multi"

value="${x}"

${selected.includes(x)?"checked":""}

>

${x}

</label>

`)

.join("")

}


${
custom.length
?
`

<input

data-field="${field.key}"

data-type="array"

value="${custom.join(",")}"

placeholder="Custom"

>

`
:
""
}

`;

}





/*
 BOOLEAN
*/

if(
config.type==="boolean"
||
field.type==="boolean"
){

return `

<label>

<input
type="checkbox"

data-field="${field.key}"

data-type="boolean"

${value?"checked":""}

>

${config.label}

</label>

`;

}






/*
 OBJECT fallback
*/

if(field.type==="object"){

return `

<label>
${config.label}
</label>


<textarea

data-field="${field.key}"

data-type="object"

>${JSON.stringify(value,null,2)}</textarea>

`;

}






/*
 ARRAY fallback
*/

if(field.type==="array"){

return `

<label>
${config.label}
</label>


<input

data-field="${field.key}"

data-type="array"

value="${value.join(",")}"

>

`;

}





/*
 DEFAULT
*/

return `

<label>
${config.label}
</label>


<input

data-field="${field.key}"

data-type="${field.type}"

value="${value}"

>

`;


}





function renderEditor(item){


let root =
document.getElementById(
"editor-root"
);



let fields =
editableFields(item)

.map(renderDynamicField)

.join("");



root.innerHTML=`


<h1>
✏ Dynamic Content Editor
</h1>


<p>
${item.refId || item.publicId || item.id}
</p>


${fields}



<label>
Edit reason
</label>


<textarea

id="edit-reason"

placeholder="Explain why you changed this"

></textarea>



<button

class="btn btn-primary"

onclick="saveEditor()">

💾 Save Changes

</button>


<br><br>


<h3>
History
</h3>


<div>

${renderHistory(item)}

</div>


`;


}









function renderHistory(item){



let history =
item.history || [];



if(!history.length){


return "No edits yet.";

}




return history

.slice()

.reverse()

.map(h=>`

<div class="history-item">


<b>

${h.action}

</b>


<br>


${h.reason || ""}


<br>


<small>

${h.createdAt || ""}

</small>


</div>


`)

.join("");



}









async function saveEditor(){



let reason =
document.getElementById(
"edit-reason"
)
.value
.trim();



if(!reason){


showToast(
"Reason required",
"error"
);


return;


}




let changes =
buildChangesFromFields();





let saved =
await saveEntityEdit(

editingCollection,

editingEntity.id,

changes,

reason

);




showToast(

"Changes saved",

"success"

);



editingEntity=saved;



renderEditor(saved);



}


</script>


</body>

</html>
