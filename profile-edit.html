<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Edit Profile | Pharmora
</title>


<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/responsive.css">


</head>


<body>


<div id="site-header"></div>


<main class="container section">


<div class="card">


<h1>
✏ Edit Profile
</h1>



<label>
Display Name
</label>

<input id="name">



<label>
Avatar URL
</label>

<input
id="avatar"
placeholder="Image URL">



<label>
Headline
</label>

<input
id="headline"
placeholder="Clinical Pharmacist | Researcher">



<label>
About
</label>

<textarea id="bio"></textarea>





<h2>
Identity
</h2>



<label>
Profile Types
</label>

<input
id="types"
placeholder="student, educator, professional">



<label>
Specializations
</label>

<input
id="specializations"
placeholder="QA, Pharmacology, Clinical Pharmacy">






<h2>
Professional
</h2>



<label>
Position
</label>


<input
id="position"
placeholder="Assistant Professor / Pharmacist">


<label>
Organization
</label>


<input
id="organization"
placeholder="College / Company">






<h2>
✔ Verification
</h2>


<p>
Request verification to build trust.
</p>


<select id="verifyType">

<option value="educator">
Educator
</option>

<option value="professional">
Professional
</option>

</select>


<input
id="verifyTitle"
placeholder="Title">


<input
id="verifyOrg"
placeholder="Organization">


<button
class="btn"
onclick="sendVerificationRequest()">

Request Verification ✔

</button>








<h2>
🌐 Contact
</h2>



<label>
LinkedIn
</label>


<input id="linkedin">



<label>
Website
</label>


<input id="website">




<label>

<input
type="checkbox"
id="linkedinVisible">

Show LinkedIn publicly

</label>



<label>

<input
type="checkbox"
id="websiteVisible">

Show website publicly

</label>



<label>

<input
type="checkbox"
id="emailVisible">

Show email publicly

</label>






<br><br>



<button
class="btn btn-primary"
onclick="saveProfile()">

Save Profile

</button>



</div>


</main>



<div id="site-footer"></div>





<script src="/js/pharmora.js"></script>


<script>


window.addEventListener(

"pharmora-ready",

loadEditor

);





async function loadEditor(){



let user =
currentUser();



if(!user){


location.href="/auth/login.html";


return;


}





let profile =
await getProfile(
user.id
);





if(!profile){


profile =
await createUserProfile(
user
);


}






name.value =
profile.displayName || "";



avatar.value =
profile.avatar?.url || "";



headline.value =
profile.headline || "";



bio.value =
profile.bio || "";





types.value =
(

profile.types || []

)
.join(", ");





specializations.value =
(

profile.specializations || []

)
.join(", ");






let job =
profile.positions?.[0] || {};



position.value =
job.title || "";



organization.value =
job.organization || "";






linkedin.value =
profile.contact?.linkedin?.value || "";



website.value =
profile.contact?.website?.value || "";





linkedinVisible.checked =
profile.contact?.linkedin?.visible || false;



websiteVisible.checked =
profile.contact?.website?.visible || false;



emailVisible.checked =
profile.contact?.email?.visible || false;



}









async function saveProfile(){


let user =
currentUser();


let displayName =
document.getElementById("name").value;


let initials =
displayName
?
displayName
.split(" ")
.map(x=>x[0])
.join("")
.substring(0,2)
.toUpperCase()
:
"PH";




await updateUserProfile({



displayName:
displayName,



avatar:{


url:
document.getElementById("avatar").value,


initials:
initials


},




headline:
headline.value,



bio:
bio.value,




types:

types.value

.split(",")

.map(x=>x.trim())

.filter(Boolean),






specializations:

specializations.value

.split(",")

.map(x=>x.trim())

.filter(Boolean),







positions:

(

position.value ||

organization.value

)

?

[

{

title:
position.value,


organization:
organization.value,


current:true

}

]

:

[],






contact:{



linkedin:{


value:
linkedin.value,


visible:
linkedinVisible.checked


},



website:{


value:
website.value,


visible:
websiteVisible.checked


},



email:{


value:
user.email,


visible:
emailVisible.checked


}


}


});





alert(
"Profile updated successfully"
);




location.href =

"/profile.html?id="

+

user.id;



}









async function sendVerificationRequest(){



if(

typeof requestVerification !== "function"

){


alert(

"Verification module unavailable"

);


return;


}




await requestVerification({


types:[verifyType.value],



title:

verifyTitle.value,



organization:

verifyOrg.value


});





alert(

"Verification request sent"

);



}


</script>


</body>

</html>
