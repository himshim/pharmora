<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile | Pharmora</title>

<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/responsive.css">

</head>


<body>

<div id="site-header"></div>


<main class="container section">


<div class="card">


<h1>✏ Edit Profile</h1>


<div id="completion"></div>


<label>Name</label>
<input id="name">


<label>Avatar URL</label>
<input id="avatar">


<label>Headline</label>
<input id="headline">


<label>About</label>
<textarea id="bio"></textarea>



<h2>Identity</h2>


<label>Profile Types</label>

<input
id="types"
placeholder="student, educator, professional">



<label>Specializations</label>

<input
id="specializations">



<h2>Professional</h2>


<label>Position</label>
<input id="position">


<label>Organization</label>
<input id="organization">




<h2>🌐 Contact</h2>


<label>LinkedIn</label>
<input id="linkedin">


<label>Website</label>
<input id="website">



<label>
<input type="checkbox" id="linkedinVisible">
Show LinkedIn publicly
</label>


<label>
<input type="checkbox" id="websiteVisible">
Show Website publicly
</label>


<label>
<input type="checkbox" id="emailVisible">
Show Email publicly
</label>



<br><br>


<button
class="btn btn-primary"
onclick="saveProfile()">

Save Profile

</button>



</div>


</main>


<div id="site-footer"></div>


<script src="/js/pharmora.js"></script>


<script>


let originalProfile=null;


const $ = id =>
document.getElementById(id);



window.addEventListener(
"pharmora-ready",
loadEditor
);




async function loadEditor(){


let user=currentUser();


if(!user){

location.href="/auth/login.html";

return;

}



let profile =
await getProfile(user.id);



if(!profile){

profile =
await createUserProfile(user);

}



originalProfile =
profile;



$("name").value =
profile.displayName || "";


$("avatar").value =
profile.avatar?.url || "";


$("headline").value =
profile.headline || "";


$("bio").value =
profile.bio || "";



$("types").value =
(profile.types || [])
.join(", ");



$("specializations").value =
(profile.specializations || [])
.join(", ");



let job =
profile.positions?.[0] || {};



$("position").value =
job.title || "";


$("organization").value =
job.organization || "";



$("linkedin").value =
profile.contact?.linkedin?.value || "";


$("website").value =
profile.contact?.website?.value || "";



$("linkedinVisible").checked =
profile.contact?.linkedin?.visible || false;


$("websiteVisible").checked =
profile.contact?.website?.visible || false;


$("emailVisible").checked =
profile.contact?.email?.visible || false;



showCompletion(profile);


}




function showCompletion(profile){


let total=6;
let done=0;


if(profile.avatar?.url) done++;

if(profile.bio) done++;

if(profile.headline) done++;

if(profile.positions?.length) done++;

if(profile.specializations?.length) done++;

if(profile.verification?.verified) done++;



let score =
Math.round(
(done/total)*100
);



$("completion").innerHTML = `

<div class="badge">

Profile ${score}% complete

</div>

<br>

`;



}







function criticalChanged(){


if(

!originalProfile?.verification?.verified

){

return false;

}



let oldJob =
originalProfile.positions?.[0] || {};



return (

originalProfile.displayName
!==$("name").value

||

oldJob.title
!==$("position").value

||

oldJob.organization
!==$("organization").value

);


}









async function saveProfile(){



let user=currentUser();



let verification =
originalProfile.verification;



if(
criticalChanged()
){


verification={

verified:false,

verifiedTypes:[],

verifiedAt:null,

status:"needs_review",

previousVerified:true

};



showToast?.(

"Important verified details changed. Verification review required.",

"warning"

);



}






let displayName =
$("name").value;



let initials =

displayName

?

displayName
.split(" ")
.map(x=>x[0])
.join("")
.substring(0,2)
.toUpperCase()

:

"PH";







await updateUserProfile({



displayName,



avatar:{

url:$("avatar").value,

initials

},



headline:
$("headline").value,


bio:
$("bio").value,



types:

$("types").value

.split(",")

.map(x=>x.trim())

.filter(Boolean),



specializations:

$("specializations").value

.split(",")

.map(x=>x.trim())

.filter(Boolean),





positions:[

{

title:$("position").value,

organization:$("organization").value,

current:true

}

],



verification,



contact:{


linkedin:{

value:$("linkedin").value,

visible:$("linkedinVisible").checked

},



website:{

value:$("website").value,

visible:$("websiteVisible").checked

},



email:{

value:user.email,

visible:$("emailVisible").checked

}


}


});




if(

typeof showToast==="function"

){

showToast(
"Profile updated successfully",
"success"
);

}






setTimeout(()=>{


location.href=

"/profile.html?id="+user.id;


},700);



}




</script>


</body>

</html>
