<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile | Pharmora</title>

<link rel="stylesheet" href="/css/pharmora.css">

</head>


<body>


<div id="site-header"></div>


<main class="container section" data-requires="profile-wizard">


<div id="profile-wizard-root">Loading Profile Wizard...</div>


</main>



<div id="site-footer"></div>



<script src="/js/pharmora.js"></script>



<script>


const $ = id =>
document.getElementById(id);



let originalProfile=null;


let profileTypesConfig=null;

window.addEventListener(

"pharmora-ready",

loadEditor

);






function notify(msg,type="info"){


if(

typeof showToast==="function"

){

showToast(msg,type);

}

else{

console.log(type,msg);

}


}









async function loadEditor(){
  let user = currentUser();
  if(!user){
    location.href="/auth/login.html";
    return;
  }
  let profile = await getProfile(user.id);
  if(!profile){
    profile = await createUserProfile(user);
  }
  originalProfile = profile;
  PharmoraProfileWizard.initWizard(profile);
</script>


</body>

</html>
