<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Settings

</title>



<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">



<style>


.settings{

max-width:900px;

margin:auto;

padding:40px 20px;

}



.setting-card{

padding:25px;

margin-bottom:18px;

border-radius:25px;

background:var(--surface);

border:1px solid var(--border);

transition:.25s;

}



.setting-card:hover{

border-color:var(--primary);

transform:translateY(-3px);

}



.status{

font-weight:bold;

color:var(--primary);

}



</style>


</head>




<body>


<div id="site-header"></div>




<main class="settings">



<h1>

⚙ Account Settings

</h1>


<br>



<div id="settings-content">

Loading...

</div>



</main>





<div id="site-footer"></div>






<script src="/js/pharmora.js"></script>




<script>


async function loadSettings(){



let box =
document.getElementById(
"settings-content"
);



let user =
currentUser();



if(!user){


box.innerHTML=

`

<div class="card">

Please login first.

</div>

`;


return;


}





let profile =

await getProfile(

user.id

);





box.innerHTML = `



<div

class="setting-card"

onclick="location.href='../profile-edit.html'">


<h2>

👤 Public Profile

</h2>


<p>

Edit your bio, education, work and contact info.

</p>


</div>








<div class="setting-card">


<h2>

✔ Verification

</h2>


<p class="status">


${

profile?.verification?.verified

?

"Verified"

:

"Not verified"

}


</p>


</div>








<div class="setting-card">


<h2>

🌱 Contributor

</h2>



<p class="status">


${

profile?.contributor?.enabled

?

"Contributor"

:

"Not contributor"

}


</p>



</div>









<div

class="setting-card"

onclick="location.href='../components/notification/'">


<h2>

🔔 Notifications

</h2>


<p>

View your updates.

</p>


</div>









<div class="setting-card">


<h2>

🔒 Account

</h2>


<button

class="btn"

onclick="logoutUser()">

Logout

</button>


</div>



`;



}




loadSettings();


</script>



</body>

</html>
