# =========================
# Netlify Configuration
# Development Stage
# =========================


[build]

publish = "."



# =========================
# ROUTING
# =========================


[[redirects]]

from = "/*"

to = "/index.html"

status = 200





# =========================
# SECURITY HEADERS
# =========================


[[headers]]

for = "/*"

[headers.values]

X-Frame-Options = "DENY"

X-Content-Type-Options = "nosniff"

Referrer-Policy = "strict-origin-when-cross-origin"





# =========================
# HTML
# Always refresh pages
# =========================


[[headers]]

for = "/*.html"

[headers.values]

Cache-Control = "no-cache"





# =========================
# CSS
# Development mode
# =========================


[[headers]]

for = "/css/*"

[headers.values]

Cache-Control = "no-cache"





# =========================
# JavaScript
# Development mode
# =========================


[[headers]]

for = "/js/*"

[headers.values]

Cache-Control = "no-cache"



[[headers]]

for = "/components/*"

[headers.values]

Cache-Control = "no-cache"





# =========================
# Dynamic JSON data
# =========================


[[headers]]

for = "/config/*"

[headers.values]

Cache-Control = "no-cache"



[[headers]]

for = "/data/*"

[headers.values]

Cache-Control = "no-cache"





# =========================
# Static assets
# Cache allowed
# =========================


[[headers]]

for = "/assets/*"

[headers.values]

Cache-Control = "public, max-age=86400"