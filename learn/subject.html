<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Subject | Pharmora
</title>


<link rel="icon"
href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">


<style>


.hero{

text-align:center;

padding:50px 0;

}


.unit{

padding:20px;

background:var(--surface);

border:1px solid var(--border);

border-radius:20px;

margin-bottom:15px;

}


.topic{

margin-top:10px;

color:var(--text-muted);

}


</style>


</head>



<body>



<header class="container">


<nav class="navbar">


<a href="../" class="logo">


<img
src="../assets/branding/logo.svg"
height="32"
style="vertical-align:middle;">


Pharmora


</a>



<div class="nav-links">


<a href="./">
Learn
</a>


<a href="../community/">
Community
</a>


</div>


</nav>


</header>






<main>



<section class="container hero">


<div class="badge">

📚 Subject Workspace

</div>



<h1 id="subject-title">

Loading...

</h1>



<p id="subject-desc">

Preparing resources...

</p>


</section>







<section class="container section">


<h2 class="section-title">

Learning Resources

</h2>



<div class="grid">


<div class="card">

<h2>📝 Notes</h2>

<p>Study materials</p>

</div>



<div class="card">

<h2>🖥 PPT</h2>

<p>Presentations</p>

</div>



<div class="card">

<h2>❓ Questions</h2>

<p>MCQs and exams</p>

</div>



<div class="card">

<h2>👨‍🏫 Teaching</h2>

<p>Teacher resources</p>

</div>



</div>



</section>









<section class="container section">


<h2 class="section-title">

Syllabus Units

</h2>


<div id="unit-list">


</div>



</section>




</main>






<script>


async function loadSubject(){



const file =

"../data/subjects/pharmaceutics-1.json";



const response =
await fetch(file);



const data =
await response.json();



const subject =
data.subject;





document.getElementById(
"subject-title"
).innerHTML =

subject.code+
" - "+
subject.name;






document.getElementById(
"subject-desc"
).innerHTML =

subject.description;








const unitBox =
document.getElementById(
"unit-list"
);



subject.units.forEach(unit=>{



unitBox.innerHTML += `


<div class="unit">


<h2>

Unit ${unit.unit}

</h2>



<h3>

${unit.title}

</h3>



<div class="topic">


${unit.topics.join("<br>")}


</div>



</div>


`;



});



}



loadSubject();


</script>



</body>


</html>
