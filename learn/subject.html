<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Subject | Pharmora
</title>


<link rel="icon" href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>



<body>


<div id="site-header"></div>





<main class="container section">


<div
class="card"
id="subject-info">

Loading...

</div>




<br><br>



<h2 class="section-title">

📄 Units / Chapters

</h2>


<div
class="grid"
id="units-list">

</div>







<br><br>


<h2 class="section-title">

📚 Learning Materials

</h2>


<div
class="grid"
id="materials-list">

</div>




</main>





<div id="site-footer"></div>






<script src="/js/pharmora.js"></script>










<script>


let subjectId =

new URLSearchParams(
location.search
)

.get("id");









async function loadSubject(){





let subjects =
await getRecords(
"subjects"
);





let subject =
subjects.find(

x=>x.id===subjectId

);






if(!subject){


document

.getElementById(
"subject-info"
)

.innerHTML=

"<h2>Subject not found</h2>";



return;


}









document

.getElementById(
"subject-info"
)

.innerHTML = `


<h1>

🧪 ${subject.name}

</h1>



<h3>

${subject.code || ""}

</h3>



<p>

${subject.description || ""}

</p>


`;








loadUnits();


loadMaterials();



}












async function loadUnits(){



let box =
document.getElementById(
"units-list"
);





let units =
await getRecords(
"units"
);





units =
units.filter(

x=>x.subject===subjectId

);







if(units.length===0){


box.innerHTML=

"<div class='card'>No units added</div>";


return;


}







units.forEach(unit=>{



box.innerHTML += `


<div class="card">


<h2>

📄 ${unit.name}

</h2>



<p>

${unit.description || ""}

</p>


</div>


`;



});



}









async function loadMaterials(){



let box =
document.getElementById(
"materials-list"
);




let collections=[


["resources","📚"],

["books","📖"],

["teaching-materials","👨‍🏫"],

["question-bank","❓"],

["assignments","📝"]


];








for(let col of collections){



let data =
await getRecords(
col[0]
);





data =
data.filter(x=>


x.subject===subjectId

&&

x.status==="approved"


);







data.forEach(item=>{



box.innerHTML += `


<div class="card">


<h2>

${col[1]}

${

item.title ||

item.question ||

"Untitled"

}

</h2>



<p>

${item.description || ""}

</p>





<a

class="btn"

href="${appPath(`library/view.html?id=${item.id}&type=${col[0]}`)}">


Open


</a>


</div>


`;



});



}








if(box.innerHTML===""){



box.innerHTML=

"<div class='card'>No materials yet</div>";



}



}








loadSubject();


</script>




</body>

</html>
