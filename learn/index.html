<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Learn | Pharmora
</title>


<link rel="icon" href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">


<style>


.hero{

text-align:center;

padding:60px 0;

}



.hero h1{

font-size:3.5rem;

}



.learn-block{

margin-bottom:40px;

}



.learn-item{

padding:20px;

border-radius:20px;

background:var(--surface);

border:1px solid var(--border);

cursor:pointer;

transition:var(--transition);

}



.learn-item:hover{

border-color:var(--primary);

transform:translateY(-5px);

}



.path-box{

padding:18px;

border-radius:20px;

background:var(--surface);

border:1px solid var(--border);

margin-bottom:25px;

}



</style>


</head>







<body>



<div id="site-header"></div>







<main>






<section class="container hero">


<div class="badge">

🎓 Learn

</div>



<h1>


Learn Pharmacy

<br>


<span style="
background:linear-gradient(
90deg,
var(--primary),
var(--secondary)
);
-webkit-background-clip:text;
color:transparent;
">

Your Way

</span>


</h1>




<p>

Explore structured pharmacy education.

</p>





<div class="search-box">


<input

placeholder="Search courses, subjects, units..."

oninput="pharmoraSearch(this.value)"


>


</div>





<div

id="search-results"

class="grid"

style="margin-top:30px;">


</div>



</section>









<section class="container section">



<div class="path-box">


<b>

Current Path:

</b>


<span id="learning-path">

Select course

</span>


</div>



</section>









<section class="container section learn-block">


<h2 class="section-title">

🎓 Courses

</h2>



<div

class="grid"

id="course-list">


</div>


</section>











<section class="container section learn-block">


<h2 class="section-title">

📘 Curriculums

</h2>



<div

class="grid"

id="curriculum-view">


<div class="card">


<h2>

Choose a course

</h2>


<p>

Available curriculums will appear here.

</p>


</div>


</div>


</section>











<section class="container section learn-block">


<h2 class="section-title">

📅 Semester / Year

</h2>



<div

class="grid"

id="semester-view">


</div>


</section>












<section class="container section learn-block">


<h2 class="section-title">

🧪 Subjects

</h2>



<div

class="grid"

id="subject-view">


</div>


</section>












<section class="container section learn-block">


<h2 class="section-title">

📄 Units & Chapters

</h2>



<div

class="grid"

id="unit-view">


</div>


</section>












<section class="container section learn-block">


<h2 class="section-title">

📚 Related Materials

</h2>



<div

class="grid"

id="learning-materials">


</div>


</section>







</main>








<div id="site-footer"></div>








<<script src="/js/pharmora.js"></script>






<!-- COMPONENTS LAST -->

<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>







<script>


loadLearn();


</script>





</body>


</html>
