<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Learn

</title>


<link 
rel="icon"
href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">





<style>


.hero{

text-align:center;

padding:50px 0;

}



.hero h1{

font-size:3.5rem;

}




.subject{

padding:20px;

margin-bottom:12px;

background:var(--surface);

border:1px solid var(--border);

border-radius:20px;

transition:var(--transition);

}




.subject:hover{

border-color:var(--primary);

transform:translateX(5px);

}



</style>


</head>






<body>





<div id="site-header"></div>








<main>








<section class="container hero">





<div class="badge">

🎓 Learn

</div>





<h1>


Learn Pharmacy


<br>




<span style="
background:linear-gradient(
90deg,
var(--primary),
var(--secondary)
);
-webkit-background-clip:text;
color:transparent;
">


Your Way


</span>



</h1>





<p>

Resources organized by course,
curriculum, semester and subject.

</p>






<div class="search-box">


<input 

placeholder="Search courses, subjects, topics..."

oninput="pharmoraSearch(this.value)"

>


</div>






<div 

id="search-results"

class="grid"

style="margin-top:30px;">


</div>





</section>











<section class="container section">



<h2 class="section-title">

Choose Course

</h2>




<div

class="grid"

id="course-list">


</div>




</section>









<section class="container section">




<h2 class="section-title">

Curriculum Explorer

</h2>






<div

class="grid"

id="curriculum-view">





<div class="card">



<h2>

Select a course

</h2>



<p>

Choose a course above to explore curriculum.

</p>



</div>





</div>





</section>










<section class="container section">



<h2 class="section-title">

Popular Subjects

</h2>





<div class="subject">

💊 Pharmacology

</div>





<div class="subject">

⚗ Pharmaceutics

</div>





<div class="subject">

🧬 Pharmaceutical Chemistry

</div>





<div class="subject">

🌿 Pharmacognosy

</div>





</section>







</main>







<div id="site-footer"></div>









<!-- APP CORE (always first) -->
<script src="../js/app.js"></script>



<!-- SERVICES -->
<script src="../js/services/analytics.service.js"></script>

<script src="../js/services/database.service.js"></script>



<!-- COMPONENTS -->
<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>



<!-- DATA / FEATURES -->
<script src="../js/data-loader.js"></script>

<script src="../js/search.js"></script>





<script>


renderCourses(
"course-list"
);


</script>






</body>


</html>
