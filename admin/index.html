<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmora Workbench — Admin</title>
  <style>
    /* ─── Workbench Shell ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }

    body {
      background: radial-gradient(circle at top, rgba(34,211,238,.1), transparent 40%), var(--background);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ─── Top Global Bar ──────────────────────────── */
    #admin-global-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(15,23,42,.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }

    #admin-global-bar .bar-brand {
      font-size: 1.1rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    #wb-search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    #wb-global-search {
      width: 100%;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    #wb-global-search:focus { border-color: var(--primary); }

    #wb-search-results {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      max-height: 400px;
      overflow-y: auto;
      z-index: 9999;
    }

    #admin-user-chip {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-soft);
      white-space: nowrap;
    }

    /* ─── Shell Layout ────────────────────────────── */
    #admin-shell {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ─────────────────────────────────── */
    #admin-sidebar {
      width: 220px;
      min-width: 220px;
      height: 100%;
      overflow-y: auto;
      padding: 16px 10px;
      background: rgba(15,23,42,.85);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      scrollbar-width: thin;
    }

    /* ─── Content Column ──────────────────────────── */
    #admin-content-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ─── Dynamic Toolbar ─────────────────────────── */
    #admin-toolbar {
      flex-shrink: 0;
    }

    /* ─── Workspace ───────────────────────────────── */
    #admin-workspace {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      scrollbar-width: thin;
    }

    /* ─── Entity Drawer ───────────────────────────── */
    #entity-drawer {
      position: fixed;
      top: 0; right: -560px;
      width: 560px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 40px rgba(0,0,0,.2);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      transition: right .3s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    #entity-drawer.open { right: 0; }

    /* ─── Modals / Toast / Loading ────────────────── */
    #admin-modals  { position: fixed; inset: 0; z-index: 12000; pointer-events: none; }
    #admin-toast   { position: fixed; bottom: 20px; right: 20px; z-index: 13000; display: flex; flex-direction: column; gap: 8px; }
    #admin-loading {
      position: fixed; inset: 0; z-index: 14000;
      background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #fff; gap: 12px;
    }
    #admin-loading.visible { display: flex; }

    /* ─── Responsive ──────────────────────────────── */
    @media (max-width: 900px) {
      #admin-sidebar { width: 56px; min-width: 56px; padding: 12px 6px; }
      #admin-sidebar .wb-nav-label,
      #admin-sidebar #wb-nav-search { display: none; }
    }
    @media (max-width: 600px) {
      #admin-shell { flex-direction: column; }
      #admin-sidebar { width: 100%; height: auto; min-width: unset; flex-direction: row; overflow-x: auto; padding: 8px; }
      #admin-workspace { padding: 14px; }
      #entity-drawer { width: 100%; right: auto; bottom: -85vh; top: auto; height: 85vh;
        border-left: none; border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
        transition: bottom .3s cubic-bezier(.4,0,.2,1); }
      #entity-drawer.open { bottom: 0; }
    }

    /* ─── Toast animation ─────────────────────────── */
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
  <script type="module" crossorigin src="/assets/admin-BPlHw6aC.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/index-8tSMc_YZ.js">
  <link rel="stylesheet" crossorigin href="/assets/index-DoQZfCZe.css">
</head>

<body data-requires="admin">
<div id="root">
<!-- ══════════════════════════════════════════════════
     PHARMORA WORKBENCH SHELL
     No business UI. All content mounted by JS.
══════════════════════════════════════════════════ -->

<!-- Global Top Bar -->
<div id="admin-global-bar">
  <span class="bar-brand">⚕ Workbench</span>

  <div id="wb-search-wrap">
    <input id="wb-global-search" type="text" placeholder="🔍 Search entities, users… (Ctrl+K)" data-wb-search autocomplete="off" />
    <div id="wb-search-results"></div>
  </div>

  <span id="admin-user-chip"></span>

  <button onclick="logoutUser && logoutUser()"
    style="padding:6px 14px;border:1px solid var(--border);background:none;color:var(--text-soft);border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;">
    🚪 Logout
  </button>
</div>

<!-- Shell -->
<div id="admin-shell">

  <!-- Left Sidebar — Navigation -->
  <aside id="admin-sidebar"></aside>

  <!-- Main Content Column -->
  <div id="admin-content-column">

    <!-- Dynamic Toolbar (populated by active module) -->
    <div id="admin-toolbar"></div>

    <!-- Workspace (populated by active module) -->
    <main id="admin-workspace"></main>

  </div>

</div>

<!-- Sliding Entity / User Drawer -->
<aside id="entity-drawer"></aside>

<!-- System containers -->
<div id="admin-modals"></div>
<div id="admin-toast"></div>
<div id="admin-loading"><span>⏳</span> Loading…</div>
</div>
<!-- ══════════════════════════════════════════════════
     CORE SERVICES
══════════════════════════════════════════════════ -->
<script src="/js/pharmora.js"></script>

<!-- ══════════════════════════════════════════════════
     WORKBENCH BOOT
══════════════════════════════════════════════════ -->
<script>
/* Expose toast globally so UES modules can call showToast() */
function showToast(msg, type = 'info') {
  const box = document.getElementById('admin-toast');
  if (!box) return;
  const el = document.createElement('div');
  el.style.cssText = `
    padding:11px 18px;border-radius:12px;font-weight:600;font-size:0.85rem;
    animation:toastIn .25s ease;pointer-events:auto;
    background:${type === 'success' ? 'var(--primary)' : type === 'error' ? '#ef4444' : 'var(--surface)'};
    color:${type === 'success' || type === 'error' ? '#fff' : 'var(--text)'};
    border:1px solid var(--border);
    box-shadow:0 8px 24px rgba(0,0,0,.18);
    cursor:pointer;
  `;
  el.textContent = msg;
  el.onclick = () => el.remove();
  box.appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

function showLoading(on) {
  document.getElementById('admin-loading')?.classList.toggle('visible', on);
}

/* Populate user chip in top bar */
function populateUserChip() {
  if (typeof currentUser !== 'function') return;
  const user = currentUser();
  const chip = document.getElementById('admin-user-chip');
  if (chip && user) chip.textContent = `👑 ${user.name || user.email} (${user.role || ''})`;
}

async function bootWorkbench() {
  showLoading(true);

  // Permission gate
  if (typeof requirePermission === 'function') {
    const ok = await requirePermission('content.review');
    if (!ok) { showLoading(false); return; }
  }
  if (typeof applyPermissions === 'function') await applyPermissions();

  populateUserChip();

  // Boot Admin Workbench
  if (typeof PharmoraAdminWorkbench !== 'undefined') {
    await PharmoraAdminWorkbench.boot({
      workspace:     'admin-workspace',
      sidebar:       'admin-sidebar',
      toolbar:       'admin-toolbar',
      drawer:        'entity-drawer',
      defaultModule: 'overview',
    });
  } else {
    document.getElementById('admin-workspace').innerHTML =
      `<div style="padding:60px;text-align:center;color:#ef4444;">
         Admin Workbench modules not loaded. Check that pharmora.admin.js bundle is available.
       </div>`;
  }

  showLoading(false);
}

if (window.PharmoraReady) {
  bootWorkbench();
} else {
  window.addEventListener('pharmora-ready', bootWorkbench, { once: true });
}
</script>

</body>
</html>
