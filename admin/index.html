<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Admin

</title>



<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">




<style>


.admin{

display:flex;

min-height:100vh;

}





.sidebar{

width:260px;

padding:25px;

background:rgba(15,23,42,.85);

border-right:1px solid var(--border);

}





.brand{

font-size:1.8rem;

font-weight:900;

margin-bottom:35px;


background:

linear-gradient(
90deg,
var(--primary),
var(--secondary)
);


-webkit-background-clip:text;

color:transparent;

}





.menu div{

padding:15px;

border-radius:15px;

margin-bottom:8px;

color:var(--text-soft);

cursor:pointer;

}





.menu div:hover{

background:var(--surface-light);

}






.content{

flex:1;

padding:30px;

}





.panel{

padding:20px;

border-radius:20px;

background:var(--surface);

border:1px solid var(--border);

margin-bottom:12px;

display:flex;

justify-content:space-between;

cursor:pointer;

}






.status{

color:var(--primary);

}






@media(max-width:800px){


.admin{

display:block;

}


.sidebar{

width:100%;

}


}



</style>


</head>








<body>







<div class="admin">








<aside class="sidebar">







<div 
class="brand"

id="admin-brand">


⚕ Platform


</div>










<div class="menu">





<div data-permission="analytics">

📊 Overview

</div>






<div data-permission="resources">

📚 Resource Review

</div>







<div data-permission="verification">

👨‍🏫 Verification

</div>








<div data-permission="forum">

💬 Forum Moderation

</div>








<div data-permission="events">

📅 Events

</div>








<div data-permission="users">

👥 Users

</div>








<div data-permission="settings">

⚙ Settings

</div>






</div>







</aside>













<main class="content">








<h1>

Admin Console

</h1>






<p>

Manage content, users and platform quality.

</p>











<section class="section">









<div class="grid">









<div class="card">



<h2 id="pending-resources">

0

</h2>



<p>

Pending Resources

</p>




</div>










<div class="card">




<h2 id="verification-count">

0

</h2>





<p>

Verification Requests

</p>




</div>











<div class="card">





<h2 id="reports-count">

0

</h2>





<p>

Reports

</p>





</div>










</div>








</section>












<section>







<h2>

Pending Actions

</h2>







<br>










<div id="admin-actions">







<div class="panel">





No pending actions





<span class="status">

✓

</span>





</div>








</div>







</section>









</main>








</div>










<script>


fetch("../config/site.json")

.then(r=>r.json())

.then(site=>{


document.getElementById("admin-brand").innerHTML =

"⚕ " + site.name;


});


</script>









<script src="../js/app.js"></script>







</body>


</html>
