<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmora — Admin Console</title>
  <link rel="stylesheet" href="../css/pharmora.css">
  <style>
    /* ─── Shell Layout ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top, rgba(34,211,238,.1), transparent 40%), var(--background);
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }

    #admin-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Sidebar ───────────────────────────────────────── */
    #admin-sidebar {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      overflow-y: auto;
      padding: 24px 16px;
      background: rgba(15,23,42,.88);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      flex-shrink: 0;
      transition: width .25s ease;
    }

    #admin-sidebar .brand {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 28px;
      padding: 0 8px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    #admin-sidebar nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 4px;
      color: var(--text-soft);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, color .18s;
    }
    #admin-sidebar nav a:hover,
    #admin-sidebar nav a.active {
      background: var(--surface-light);
      color: var(--text);
    }
    #admin-sidebar nav .nav-section {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-soft);
      padding: 18px 14px 6px;
      font-weight: 700;
    }

    /* ─── Workspace ─────────────────────────────────────── */
    #admin-workspace {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      min-width: 0;
    }

    /* ─── Entity Drawer ─────────────────────────────────── */
    #entity-drawer {
      position: fixed;
      top: 0; right: -560px;
      width: 560px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 40px rgba(0,0,0,.2);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      transition: right .3s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    #entity-drawer.open { right: 0; }

    /* ─── Modals / Toast / Loading ──────────────────────── */
    #admin-modals { position: fixed; inset: 0; z-index: 12000; pointer-events: none; }
    #admin-toast  { position: fixed; bottom: 24px; right: 24px; z-index: 13000; display: flex; flex-direction: column; gap: 10px; }
    #admin-loading {
      position: fixed; inset: 0; z-index: 14000;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #fff;
    }
    #admin-loading.visible { display: flex; }

    /* ─── Hover Quick-Preview ───────────────────────────── */
    #quick-preview-box {
      display: none;
      position: absolute;
      z-index: 10005;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      width: 300px;
      pointer-events: none;
      font-size: 0.85rem;
    }

    /* ─── Responsive ────────────────────────────────────── */
    @media (max-width: 900px) {
      #admin-sidebar { width: 64px; min-width: 64px; padding: 16px 8px; }
      #admin-sidebar .brand, #admin-sidebar nav a span, #admin-sidebar .nav-section { display: none; }
      #admin-sidebar nav a { justify-content: center; padding: 12px; font-size: 1.2rem; }
    }

    @media (max-width: 600px) {
      #admin-shell { flex-direction: column; }
      #admin-sidebar { width: 100%; height: auto; min-width: unset; position: relative; }
      #admin-workspace { padding: 16px; }
      #entity-drawer { width: 100%; right: -100%; bottom: 0; top: auto; height: 80vh; border-left: none; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; }
      #entity-drawer.open { right: 0; }
    }

    /* ─── Keyframes ─────────────────────────────────────── */
    @keyframes adminPopup {
      from { opacity: 0; transform: scale(.93) translateY(18px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>

<body>

<!-- ═══════════════════════════════════════════════════
     APPLICATION SHELL — No business UI lives here.
     All content is mounted by JavaScript below.
═══════════════════════════════════════════════════ -->

<div id="admin-shell">

  <!-- Left Navigation -->
  <aside id="admin-sidebar"></aside>

  <!-- Main Entity Workspace -->
  <main id="admin-workspace"></main>

</div>

<!-- Sliding Entity Drawer -->
<aside id="entity-drawer"></aside>

<!-- Modal Host -->
<div id="admin-modals"></div>

<!-- Toast Notifications -->
<div id="admin-toast"></div>

<!-- Global Loading Overlay -->
<div id="admin-loading">⏳ Loading…</div>

<!-- Hover Quick-Preview -->
<div id="quick-preview-box"></div>

<!-- ═══════════════════════════════════════════════════
     CORE SERVICES
═══════════════════════════════════════════════════ -->
<script src="/js/pharmora.js"></script>

<!-- ═══════════════════════════════════════════════════
     ADMIN WORKSPACE BOOTSTRAP
     Mounts Sidebar, Toolbar, Stats, EntityManager,
     Activity Feed, Drawer, Search, Bulk Actions
     using only UES APIs.
═══════════════════════════════════════════════════ -->
<script>
/* ── Helpers ───────────────────────────────────────── */
function showLoading(on) {
  document.getElementById("admin-loading").classList.toggle("visible", on);
}

function toast(msg, type = "info") {
  const box = document.getElementById("admin-toast");
  const el  = document.createElement("div");
  el.style.cssText = `
    padding:12px 18px; border-radius:12px; font-weight:600; font-size:0.88rem;
    animation:toastIn .25s ease;
    background:${type === "success" ? "var(--primary)" : type === "error" ? "#ef4444" : "var(--surface)"};
    color:${type === "success" || type === "error" ? "#fff" : "var(--text)"};
    border:1px solid var(--border);
    box-shadow:0 8px 24px rgba(0,0,0,.2);
  `;
  el.textContent = msg;
  box.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ── Sidebar renderer ──────────────────────────────── */
function mountSidebar() {
  const sidebar = document.getElementById("admin-sidebar");
  if (!sidebar) return;

  const NAV = [
    { icon: "🏠", label: "Overview",       action: () => mountEntityManager(""),            perm: null },
    { icon: "📋", label: "Review Queue",   action: () => mountEntityManager("", "pending_review"), perm: "content.review" },
    { icon: "📦", label: "Entity Manager", action: () => mountEntityManager(""),            perm: "content.manage" },
    { section: "Content" },
    { icon: "🎓", label: "Subjects",       action: () => mountEntityManager("Subject"),     perm: "subjects.manage" },
    { icon: "📘", label: "Courses",        action: () => mountEntityManager("Course"),      perm: "courses.manage" },
    { icon: "💊", label: "Drugs",          action: () => mountEntityManager("Drug"),        perm: "content.manage" },
    { icon: "📚", label: "Books",          action: () => mountEntityManager("Book"),        perm: "books.manage" },
    { icon: "❓", label: "Question Bank",  action: () => mountEntityManager("QuestionBank"),perm: "teaching.manage" },
    { section: "Admin" },
    { icon: "👥", label: "Users",          action: () => mountUserManager(),               perm: "users.manage" },
    { icon: "✔",  label: "Verification",  action: () => mountVerification(),              perm: "users.manage" },
    { icon: "🚩", label: "Reports",        action: () => mountReports(),                   perm: "forum.moderate" },
    { icon: "🧾", label: "Audit Logs",     action: () => mountAuditLogs(),                 perm: "users.manage" },
    { icon: "⚙",  label: "Settings",      action: () => mountSettings(),                  perm: "admin.settings" },
  ];

  sidebar.innerHTML = `<div class="brand">⚕ Pharmora</div><nav id="sidebar-nav"></nav>`;
  const nav = sidebar.querySelector("nav");

  NAV.forEach(item => {
    if (item.section) {
      const s = document.createElement("div");
      s.className = "nav-section";
      s.textContent = item.section;
      nav.appendChild(s);
      return;
    }
    const a = document.createElement("a");
    a.innerHTML = `${item.icon} <span>${item.label}</span>`;
    if (item.perm) a.dataset.permission = item.perm;
    a.addEventListener("click", () => {
      nav.querySelectorAll("a").forEach(x => x.classList.remove("active"));
      a.classList.add("active");
      item.action();
    });
    nav.appendChild(a);
  });

  // Apply permission visibility
  if (typeof applyPermissions === "function") applyPermissions();
}

/* ── Live Counters ─────────────────────────────────── */
async function mountStats(containerEl) {
  if (typeof PharmoraEntityAPI === "undefined") return;
  const list = await PharmoraEntityAPI.listEntities().catch(() => []);
  const c = { draft:0, pending_review:0, approved:0, published:0, archived:0 };
  list.forEach(e => { if (c[e.status] !== undefined) c[e.status]++; });

  containerEl.innerHTML = `
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; margin-bottom:28px;">
      ${[
        ["Total",       list.length,         "📦"],
        ["Pending",     c.pending_review,    "⏳"],
        ["Published",   c.published,         "📢"],
        ["Drafts",      c.draft,             "📝"],
        ["Archived",    c.archived,          "🗄"],
      ].map(([label,val,icon]) => `
        <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; text-align:center; cursor:default; transition:.2s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
          <div style="font-size:1.6rem;">${icon}</div>
          <div style="font-size:2rem; font-weight:800; margin:6px 0;">${val}</div>
          <div style="font-size:0.8rem; color:var(--text-soft); font-weight:600;">${label}</div>
        </div>
      `).join("")}
    </div>
  `;
}

/* ── Activity Feed ─────────────────────────────────── */
async function mountActivityFeed(containerEl) {
  if (typeof PharmoraEntityAPI === "undefined") return;
  const list = await PharmoraEntityAPI.listEntities().catch(() => []);
  const activities = [];
  list.forEach(ent => {
    (ent.auditTrail || []).forEach(log => {
      activities.push({
        type:  ent.type,
        title: ent.content?.title || ent.content?.name || ent.publicId,
        ...log
      });
    });
  });
  activities.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  containerEl.innerHTML = `
    <h3 style="margin:0 0 14px; font-size:1rem; font-weight:700;">🕒 Recent Activity</h3>
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${activities.length ? activities.slice(0, 8).map(act => `
        <div style="font-size:0.82rem; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px;">
          <span style="color:var(--text-soft);">${new Date(act.timestamp).toLocaleTimeString()}</span>
          <strong style="text-transform:capitalize; margin-left:6px;">${act.action}</strong>
          on <strong>${act.type}</strong> — <em>${act.title}</em>
          <span style="float:right; color:var(--text-soft); font-size:0.75rem;">${act.actor || ""}</span>
        </div>
      `).join("") : `<div style="color:var(--text-soft); font-size:0.85rem;">No recent activity.</div>`}
    </div>
  `;
}

/* ── Entity Manager Workspace ──────────────────────── */
async function mountEntityManager(type = "", presetStatus = "") {
  const ws = document.getElementById("admin-workspace");
  if (!ws) return;

  showLoading(true);

  // Build Saved Views bar
  const SAVED_VIEWS = [
    { label: "All Entities",       type: "",        status: "" },
    { label: "Pending Drugs",      type: "Drug",    status: "pending_review" },
    { label: "Published Subjects", type: "Subject", status: "published" },
    { label: "My Reviews",         type: "",        status: "pending_review" },
    { label: "Today's Work",       type: "",        status: "draft" },
  ];

  ws.innerHTML = `
    <div id="ws-stats"></div>

    <!-- Saved Views -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
      ${SAVED_VIEWS.map((v,i) => `
        <button id="saved-view-${i}" onclick="applyView(${i})"
          style="padding:7px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--text-soft); font-size:0.8rem; font-weight:600; cursor:pointer; transition:.18s;">
          ${v.label}
        </button>
      `).join("")}
    </div>

    <!-- Toolbar -->
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:20px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:16px;">
      <input id="ws-search" type="text" placeholder="🔍 Search entities… (Ctrl+K)"
        style="flex:1; min-width:180px; padding:9px 14px; border-radius:10px; border:1px solid var(--border); background:var(--background); color:var(--text); font-size:0.88rem;" />

      <select id="ws-type" style="padding:9px 12px; border-radius:10px; border:1px solid var(--border); background:var(--background); color:var(--text); font-size:0.85rem;">
        <option value="">All Types</option>
        ${["Subject","Course","Drug","Book","Disease","Mechanism","Brand","Manufacturer","QuestionBank","Resource","Topic","Practical"].map(t =>
          `<option value="${t}" ${t === type ? "selected" : ""}>${t}</option>`
        ).join("")}
      </select>

      <select id="ws-status" style="padding:9px 12px; border-radius:10px; border:1px solid var(--border); background:var(--background); color:var(--text); font-size:0.85rem;">
        <option value="">All Statuses</option>
        ${["draft","pending_review","approved","published","archived"].map(s =>
          `<option value="${s}" ${s === presetStatus ? "selected" : ""}>${s.replace(/_/g," ")}</option>`
        ).join("")}
      </select>

      <select id="ws-sort" style="padding:9px 12px; border-radius:10px; border:1px solid var(--border); background:var(--background); color:var(--text); font-size:0.85rem;">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="title">Title A–Z</option>
      </select>

      <select id="ws-layout" style="padding:9px 12px; border-radius:10px; border:1px solid var(--border); background:var(--background); color:var(--text); font-size:0.85rem;">
        <option value="table">Table</option>
        <option value="grid">Grid</option>
        <option value="compact">Compact</option>
      </select>

      <span id="ws-count" style="color:var(--text-soft); font-size:0.8rem; font-weight:600; white-space:nowrap;"></span>
    </div>

    <!-- Bulk Actions Bar -->
    <div id="ws-bulk" style="display:none; gap:8px; flex-wrap:wrap; padding:10px 16px; background:rgba(34,211,238,.08); border:1px solid var(--primary); border-radius:12px; margin-bottom:14px; align-items:center;">
      <span id="ws-bulk-count" style="font-weight:700; font-size:0.88rem;"></span>
      <button onclick="bulkAction('approve')"   style="padding:6px 14px; border-radius:8px; border:none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer;">✓ Approve</button>
      <button onclick="bulkAction('publish')"   style="padding:6px 14px; border-radius:8px; border:none; background:#22c55e; color:#fff; font-weight:700; cursor:pointer;">📢 Publish</button>
      <button onclick="bulkAction('archive')"   style="padding:6px 14px; border-radius:8px; border:none; background:#64748b; color:#fff; font-weight:700; cursor:pointer;">🗄 Archive</button>
      <button onclick="bulkAction('reject')"    style="padding:6px 14px; border-radius:8px; border:none; background:#ef4444; color:#fff; font-weight:700; cursor:pointer;">✗ Reject</button>
      <button onclick="clearSelection()" style="padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-soft); font-weight:600; cursor:pointer; margin-left:auto;">Clear</button>
    </div>

    <!-- Entity Manager Mount Target -->
    <div id="ws-entity-manager">
      <div style="color:var(--text-soft); padding:40px; text-align:center;">Loading entities…</div>
    </div>

    <!-- Activity Feed -->
    <div id="ws-activity" style="margin-top:36px; padding:20px; background:var(--surface); border:1px solid var(--border); border-radius:16px;"></div>
  `;

  // Mount live counters
  await mountStats(document.getElementById("ws-stats"));

  // Mount activity feed
  await mountActivityFeed(document.getElementById("ws-activity"));

  // Mount UES Entity Manager if available
  if (typeof PharmoraEntityManagerUI !== "undefined") {
    PharmoraEntityManagerUI.render("ws-entity-manager", type);
  } else {
    document.getElementById("ws-entity-manager").innerHTML =
      `<div style="color:var(--text-soft); padding:40px; text-align:center;">EntityManager not loaded. Ensure pharmora.js is complete.</div>`;
  }

  // Wire live filter events
  const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

  const refreshFilter = debounce(() => {
    const q      = document.getElementById("ws-search")?.value  || "";
    const fType  = document.getElementById("ws-type")?.value    || "";
    const fStat  = document.getElementById("ws-status")?.value  || "";
    const sort   = document.getElementById("ws-sort")?.value    || "newest";
    if (typeof PharmoraEntityManagerUI !== "undefined") {
      PharmoraEntityManagerUI.render("ws-entity-manager", fType, { query: q, status: fStat, sort });
    }
  }, 250);

  ["ws-search","ws-type","ws-status","ws-sort"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", refreshFilter);
    if (el) el.addEventListener("change", refreshFilter);
  });

  showLoading(false);
}

/* ── Saved Views ───────────────────────────────────── */
window._savedViews = [
  { type: "",        status: "" },
  { type: "Drug",    status: "pending_review" },
  { type: "Subject", status: "published" },
  { type: "",        status: "pending_review" },
  { type: "",        status: "draft" },
];
window.applyView = function(i) {
  const v = window._savedViews[i];
  if (!v) return;
  document.querySelectorAll("[id^='saved-view-']").forEach(b => b.style.background = "var(--surface)");
  const btn = document.getElementById(`saved-view-${i}`);
  if (btn) btn.style.background = "var(--primary)";
  const typeEl   = document.getElementById("ws-type");
  const statusEl = document.getElementById("ws-status");
  if (typeEl)   typeEl.value   = v.type;
  if (statusEl) statusEl.value = v.status;
  typeEl?.dispatchEvent(new Event("change"));
};

/* ── Multi-Selection & Bulk Actions ────────────────── */
let selectedUuids = new Set();

function updateBulkBar() {
  const bar = document.getElementById("ws-bulk");
  const cnt = document.getElementById("ws-bulk-count");
  if (!bar) return;
  if (selectedUuids.size > 0) {
    bar.style.display = "flex";
    if (cnt) cnt.textContent = `${selectedUuids.size} selected`;
  } else {
    bar.style.display = "none";
  }
}

document.addEventListener("click", (e) => {
  const row = e.target.closest("[data-uuid]");
  if (!row) return;
  const uuid = row.dataset.uuid;
  if (!uuid) return;
  if (e.ctrlKey || e.metaKey) {
    selectedUuids.has(uuid) ? selectedUuids.delete(uuid) : selectedUuids.add(uuid);
    row.classList.toggle("selected", selectedUuids.has(uuid));
    updateBulkBar();
  } else if (e.shiftKey) {
    // Shift-click: select range between last selected and this row
    selectedUuids.add(uuid);
    row.classList.add("selected");
    updateBulkBar();
  } else {
    openEntityDrawer(uuid);
  }
});

function clearSelection() {
  selectedUuids.clear();
  document.querySelectorAll("[data-uuid].selected").forEach(el => el.classList.remove("selected"));
  updateBulkBar();
}

async function bulkAction(action) {
  if (selectedUuids.size === 0) return;
  showLoading(true);
  const uuids = [...selectedUuids];
  let success = 0;
  for (const uuid of uuids) {
    try {
      if (typeof PharmoraEntityReview !== "undefined") {
        if (action === "approve")  await PharmoraEntityReview.approve(uuid, "admin");
        if (action === "publish")  await PharmoraEntityReview.publish(uuid, "admin");
        if (action === "reject")   await PharmoraEntityReview.reject(uuid, "Bulk rejected", "admin");
        if (action === "archive")  await PharmoraEntityReview.archive(uuid, "admin");
      }
      success++;
    } catch(e) { console.warn("Bulk action failed for", uuid, e); }
  }
  clearSelection();
  showLoading(false);
  toast(`${action} applied to ${success} entities.`, "success");
  mountEntityManager();
}

/* ── Entity Drawer ─────────────────────────────────── */
let activeEntityUuid = null;

async function openEntityDrawer(uuid) {
  activeEntityUuid = uuid;
  const drawer = document.getElementById("entity-drawer");
  if (!drawer) return;
  drawer.classList.add("open");

  drawer.innerHTML = `<div style="padding:24px; color:var(--text-soft); font-size:0.95rem;">Loading…</div>`;

  try {
    const entity = await PharmoraEntityAPI.getEntity(uuid);
    if (!entity) {
      drawer.innerHTML = `<div style="padding:24px; color:#ef4444;">Entity not found.</div>`;
      return;
    }

    const title = entity.content?.title || entity.content?.name || entity.content?.genericName || entity.publicId;

    drawer.innerHTML = `
      <div style="padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--surface); z-index:1;">
        <div>
          <div style="font-size:1.2rem; font-weight:800; color:var(--text);">${title}</div>
          <span style="font-size:0.72rem; text-transform:uppercase; background:var(--primary-light,rgba(34,211,238,.12)); color:var(--primary); padding:2px 8px; border-radius:6px; font-weight:700;">${entity.type}</span>
          <span style="font-size:0.72rem; margin-left:8px; background:var(--surface-light); color:var(--text-soft); padding:2px 8px; border-radius:6px; font-weight:600;">${entity.status}</span>
        </div>
        <button onclick="closeEntityDrawer()" style="border:none; background:var(--surface-light); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.1rem; color:var(--text); flex-shrink:0;">✕</button>
      </div>

      <div style="padding:20px 24px; display:flex; flex-direction:column; gap:20px;">
        <!-- Workflow Actions -->
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button onclick="drawerAction('approve')"        style="padding:7px 14px; border-radius:8px; border:none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; font-size:0.82rem;">✓ Approve (A)</button>
          <button onclick="drawerAction('publish')"        style="padding:7px 14px; border-radius:8px; border:none; background:#22c55e; color:#fff; font-weight:700; cursor:pointer; font-size:0.82rem;">📢 Publish (P)</button>
          <button onclick="drawerAction('requestChanges')" style="padding:7px 14px; border-radius:8px; border:none; background:#f59e0b; color:#fff; font-weight:700; cursor:pointer; font-size:0.82rem;">🔁 Changes (R)</button>
          <button onclick="drawerAction('archive')"        style="padding:7px 14px; border-radius:8px; border:none; background:#64748b; color:#fff; font-weight:700; cursor:pointer; font-size:0.82rem;">🗄 Archive</button>
        </div>

        <!-- Metadata -->
        <div style="background:var(--background); border:1px solid var(--border); border-radius:12px; padding:14px;">
          <div style="font-size:0.75rem; font-weight:700; color:var(--text-soft); margin-bottom:10px; text-transform:uppercase;">Metadata</div>
          <div style="font-size:0.82rem; line-height:1.8;">
            <div><strong>UUID:</strong> <code>${entity.uuid || entity.publicId}</code></div>
            <div><strong>Created:</strong> ${entity.createdAt ? new Date(entity.createdAt).toLocaleString() : "—"}</div>
            <div><strong>Owner:</strong> ${entity.ownerId || "—"}</div>
          </div>
        </div>

        <!-- Workflow Panel (UES Audit Viewer) -->
        <div id="drawer-workflow"></div>

        <!-- Timeline (UES Timeline) -->
        <div id="drawer-timeline"></div>

        <!-- Relations (UES Relations) -->
        <div id="drawer-relations"></div>
      </div>
    `;

    if (typeof PharmoraEntityAuditViewer !== "undefined")
      PharmoraEntityAuditViewer.render(entity, "drawer-workflow");

    if (typeof PharmoraEntityTimeline !== "undefined") {
      const tb = document.getElementById("drawer-timeline");
      if (tb) tb.innerHTML = PharmoraEntityTimeline.render(entity);
    }

    if (typeof PharmoraEntityRelationsComponent !== "undefined") {
      const rb = document.getElementById("drawer-relations");
      if (rb) rb.innerHTML = await PharmoraEntityRelationsComponent.render(entity).catch(() => "");
    }

  } catch(err) {
    console.error(err);
    drawer.innerHTML = `<div style="padding:24px; color:#ef4444;">Failed to load entity.</div>`;
  }
}

function closeEntityDrawer() {
  document.getElementById("entity-drawer")?.classList.remove("open");
  activeEntityUuid = null;
}

/* Quick action from drawer buttons */
window.drawerAction = async function(action) {
  if (!activeEntityUuid) return;
  try {
    if (action === "approve")        await PharmoraEntityReview.approve(activeEntityUuid, "admin");
    else if (action === "publish")   await PharmoraEntityReview.publish(activeEntityUuid, "admin");
    else if (action === "archive")   await PharmoraEntityReview.archive(activeEntityUuid, "admin");
    else if (action === "requestChanges") {
      const c = prompt("Enter change request comments:");
      if (c) await PharmoraEntityReview.requestChanges(activeEntityUuid, c, "admin");
    }
    toast(`${action} successful.`, "success");
    openEntityDrawer(activeEntityUuid); // refresh drawer
    mountStats(document.getElementById("ws-stats"));
    mountActivityFeed(document.getElementById("ws-activity"));
  } catch(e) {
    toast(`Action failed: ${e.message}`, "error");
  }
};

/* ── Hover Quick Preview ────────────────────────────── */
document.addEventListener("mouseover", async (e) => {
  const row = e.target.closest("[data-uuid]");
  if (!row) return;
  const uuid = row.dataset.uuid;
  const box  = document.getElementById("quick-preview-box");
  if (!box || !uuid || typeof PharmoraEntityAPI === "undefined") return;
  const ent = await PharmoraEntityAPI.getEntity(uuid).catch(() => null);
  if (!ent) return;
  const rect = row.getBoundingClientRect();
  box.style.display = "block";
  box.style.top  = `${window.scrollY + rect.top}px`;
  box.style.left = `${window.scrollX + rect.right + 12}px`;
  box.innerHTML = `
    <strong style="display:block; margin-bottom:4px;">${ent.content?.title || ent.content?.name || ent.publicId}</strong>
    <span style="font-size:0.7rem; background:var(--border); padding:1px 6px; border-radius:4px;">${ent.type}</span>
    <span style="font-size:0.7rem; margin-left:6px; color:var(--text-soft);">${ent.status}</span>
    <p style="margin:8px 0 0; color:var(--text-soft);">${ent.content?.description || "No description."}</p>
  `;
});
document.addEventListener("mouseout", (e) => {
  if (e.target.closest("[data-uuid]"))
    document.getElementById("quick-preview-box").style.display = "none";
});

/* ── Keyboard Shortcuts ─────────────────────────────── */
document.addEventListener("keydown", async (e) => {
  if (e.ctrlKey && e.key.toLowerCase() === "k") {
    e.preventDefault();
    document.getElementById("ws-search")?.focus();
  }
  if (e.key === "Escape") closeEntityDrawer();

  if (["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName)) return;

  if (activeEntityUuid) {
    if (e.key.toLowerCase() === "a") drawerAction("approve");
    if (e.key.toLowerCase() === "p") drawerAction("publish");
    if (e.key.toLowerCase() === "r") drawerAction("requestChanges");
    if (e.key === "Delete")          drawerAction("archive");
  }
});

/* ── Stub mounts for secondary admin sections ──────── */
function mountUserManager() {
  document.getElementById("admin-workspace").innerHTML =
    `<h2>👥 User Manager</h2><p style="color:var(--text-soft);">Mounted via UES. Use EntityManagerUI to filter by type=User.</p>`;
  if (typeof PharmoraEntityManagerUI !== "undefined")
    PharmoraEntityManagerUI.render("admin-workspace", "User");
}
function mountVerification() {
  document.getElementById("admin-workspace").innerHTML =
    `<h2>✔ Verification Centre</h2>`;
  if (typeof renderVerificationCenter === "function") renderVerificationCenter();
}
function mountReports() {
  document.getElementById("admin-workspace").innerHTML =
    `<h2>🚩 Reports</h2>`;
  if (typeof renderReports === "function") renderReports();
}
function mountAuditLogs() {
  document.getElementById("admin-workspace").innerHTML =
    `<h2>🧾 Audit Logs</h2>`;
  if (typeof renderAuditLogs === "function") renderAuditLogs();
}
function mountSettings() {
  document.getElementById("admin-workspace").innerHTML =
    `<h2>⚙ Settings</h2><p style="color:var(--text-soft);">Platform configuration — coming soon.</p>`;
}

/* ── Intercept entity card clicks ───────────────────── */
document.addEventListener("click", (e) => {
  const card = e.target.closest(".universal-card, .search-result");
  if (!card) return;
  const href = card.getAttribute("href") || "";
  const m    = href.match(/#entity\/([a-zA-Z0-9-]+)/);
  if (m && m[1]) { e.preventDefault(); openEntityDrawer(m[1]); }
});

/* ── Page Boot ──────────────────────────────────────── */
async function bootAdminWorkspace() {
  showLoading(true);

  // Permission gate
  if (typeof requirePermission === "function") {
    const allowed = await requirePermission("content.review");
    if (!allowed) { showLoading(false); return; }
  }

  if (typeof applyPermissions === "function") await applyPermissions();

  mountSidebar();
  await mountEntityManager("Subject");

  showLoading(false);
}

if (window.PharmoraReady) {
  bootAdminWorkspace();
} else {
  window.addEventListener("pharmora-ready", bootAdminWorkspace, { once: true });
}
</script>
