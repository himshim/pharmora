<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Admin
</title>


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">



<style>


.admin{

display:flex;

min-height:100vh;

}



.sidebar{

width:260px;

padding:25px;

background:rgba(15,23,42,.85);

border-right:1px solid var(--border);

}



.brand{

font-size:1.8rem;

font-weight:900;

margin-bottom:35px;


background:

linear-gradient(

90deg,

var(--primary),

var(--secondary)

);


-webkit-background-clip:text;

background-clip:text;

color:transparent;

}



.menu div{

padding:15px;

border-radius:15px;

margin-bottom:8px;

color:var(--text-soft);

cursor:pointer;

transition:var(--transition);

}



.menu div:hover{

background:var(--surface-light);

color:var(--text);

}



.content{

flex:1;

padding:30px;

}



.panel{

padding:20px;

border-radius:20px;

background:var(--surface);

border:1px solid var(--border);

margin-bottom:12px;

display:flex;

justify-content:space-between;

align-items:center;

gap:15px;

}



.status{

color:var(--primary);

font-weight:bold;

}



.admin-title{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

}



@media(max-width:800px){


.admin{

display:block;

}



.sidebar{

width:100%;

}



}



</style>


</head>





<body>





<div class="admin">





<aside class="sidebar">





<div
class="brand"
id="admin-brand">

⚕ Platform

</div>







<div class="menu">






<div
data-permission="content.review"
onclick="renderAdminActions()">

📊 Review Queue

</div>






<div
data-permission="courses.manage"
onclick="loadManager('courses')">

🎓 Courses

</div>






<div
data-permission="curriculum.manage"
onclick="loadManager('curriculums')">

📘 Curriculums

</div>







<div
data-permission="curriculum.manage"
onclick="loadManager('semesters')">

📅 Semesters

</div>







<div
data-permission="subjects.manage"
onclick="loadManager('subjects')">

🧪 Subjects

</div>







<div
data-permission="categories.manage"
onclick="loadManager('categories')">

🏷 Categories

</div>







<div
data-permission="categories.manage"
onclick="loadManager('tags')">

#️⃣ Tags

</div>








<div
data-permission="books.manage"
onclick="loadManager('books')">

📚 Books

</div>








<div
data-permission="events.manage"
onclick="loadManager('events')">

📅 Events

</div>








<div
data-permission="tools.manage"
onclick="loadManager('tools')">

🧰 Tools

</div>








<div
data-permission="notifications.manage"
onclick="loadManager('notifications')">

🔔 Notifications

</div>








<div
data-permission="users.manage"
onclick="loadManager('users')">

👥 Users

</div>







</div>



</aside>









<main class="content">






<div class="admin-title">


<div>


<h1>

Admin Console

</h1>



<p>

Manage platform content and quality.

</p>


</div>



<div id="admin-user">

</div>



</div>







<section class="section">



<div
class="grid"
id="admin-stats">


</div>



</section>









<section>



<h2 id="section-title">

Management

</h2>



<br>





<div id="admin-actions">


Loading...


</div>




</section>






</main>





</div>











<script>


fetch("../config/site.json")

.then(r=>r.json())

.then(site=>{


document

.getElementById(

"admin-brand"

)

.innerHTML =

"⚕ " + site.name;


});


</script>



<script src="../js/app.js"></script>





<script src="../js/services/auth.service.js"></script>

<script src="../js/services/database.service.js"></script>

<script src="../js/services/permission.service.js"></script>


<script src="../js/services/admin.service.js"></script>

<script src="../js/services/admin-crud.service.js"></script>








<script>




async function startAdmin(){






if(

typeof requirePermission==="function"

){



let allowed =

await requirePermission(

"content.review"

);





if(!allowed){


return;


}



}










if(

typeof applyPermissions==="function"

){



await applyPermissions();



}










let user =

currentUser

?

currentUser()

:

null;









if(user){



document

.getElementById(

"admin-user"

)

.innerHTML =


"👤 " +

user.name +

" (" +

user.role +

")";



}









renderAdminStats();


renderAdminActions();





}









startAdmin();





</script>














</body>


</html>
