<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Notifications

</title>


<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/responsive.css">


<style>


.notifications{

max-width:900px;

margin:auto;

padding:40px 20px;

}



.notice-card{

margin-bottom:15px;

padding:20px;

border-radius:20px;

background:var(--surface);

border:1px solid var(--border);

}



.notice-card.unread{

border-color:var(--primary);

}



.notice-top{

display:flex;

justify-content:space-between;

gap:15px;

}



</style>


</head>



<body>


<div id="site-header"></div>




<main class="notifications">



<h1>

🔔 Notifications

</h1>


<br>


<div id="notification-list">


Loading...


</div>



</main>




<div id="site-footer"></div>








<script src="/js/pharmora.js"></script>





<script>


async function loadPage(){



let box =
document.getElementById(
"notification-list"
);



let data =
await PharmoraNotify.getMine();



if(!data.length){


box.innerHTML = `


<div class="card">

No notifications yet

</div>


`;

return;


}






box.innerHTML =

data.map(n=>{


let item =
{
...n,
...n.data
};


return `


<div
class="notice-card ${!item.read?"unread":""}"
>


<div class="notice-top">


<h3>
${item.title}
</h3>


<small>
${new Date(
item.createdAt ||
item.time ||
item.metadata?.createdAt
)
.toLocaleDateString()}
</small>


</div>


<p>
${item.message}
</p>


${
!item.read
?
`

<button
class="btn"
onclick="markRead('${item.id}')">

✓ Mark read

</button>

`
:
""
}


</div>


`;


}).join("");



}







async function markRead(id){


await PharmoraNotify.markRead(id);


if(window.PharmoraNotification){

await PharmoraNotification.refresh();

}


loadPage();


}





window.addEventListener(
"pharmora-ready",
()=>{
loadPage();
}
);


setTimeout(()=>{

if(window.PharmoraNotify){

loadPage();

}

},1000);


</script>



</body>

</html>
