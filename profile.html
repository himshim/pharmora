<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Profile | Pharmora
</title>


<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/responsive.css">


<style>

.profile-header{

display:flex;
gap:25px;
align-items:center;
flex-wrap:wrap;

}


.avatar{

width:100px;
height:100px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:2rem;
font-weight:bold;

background:var(--surface);
border:1px solid var(--border);

overflow:hidden;

}


.avatar img{

width:100%;
height:100%;
object-fit:cover;

}


.profile-grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(250px,1fr)
);

gap:20px;

}


.stat{

text-align:center;

}


.activity-item{

padding:12px 0;

border-bottom:

1px solid var(--border);

}


</style>


</head>



<body>


<div id="site-header"></div>


<main class="container section">


<div id="profile-root">

Loading profile...

</div>


</main>


<div id="site-footer"></div>







<script src="/js/pharmora.js"></script>




<script>


window.addEventListener(

"pharmora-ready",

loadProfile

);

function isMyProfile(profile){

return (
currentUser()
&&
currentUser().id === profile.userId
);

}



function platformBadge(profile){


let user=currentUser();


if(
user?.id===profile.userId
){

if(user.role==="owner"){

return "👑 Platform Owner";

}


if(user.role==="admin"){

return "🛡 Administrator";

}

}


return "";

}




async function loadProfile(){



const root =
document.getElementById(
"profile-root"
);



const params =
new URLSearchParams(
location.search
);



const id =
params.get("id");





if(!id){


root.innerHTML=`


<div class="card">

<h2>Profile not found</h2>

</div>


`;


return;


}








const profile =
await getPublicProfile(
id
);





if(!profile){


root.innerHTML=`


<div class="card">

<h2>Profile unavailable</h2>

</div>


`;


return;


}









root.innerHTML=`



<div class="card profile-header">



<div class="avatar">


${

profile.avatar?.url

?

`

<img src="${profile.avatar.url}">

`

:

(

profile.avatar?.initials ||

"PH"

)

}


</div>







<div>


<h1>


${profile.displayName || "Pharmora User"}


${

platformBadge(profile)

?

" 👑"

:

profile.verification?.verified

?

" ✔"

:

""

}


</h1>





<p>

${profile.headline || "Pharmora Community Member"}

</p>


<p>

@${profile.username || "user"}

<br>

ID:
${profile.publicId || profile.refId || ""}

</p>


${

platformBadge(profile)

?

`

<div class="badge">

${platformBadge(profile)}

</div>

`

:

""

}



<div class="badge">


${

[

...(profile.types || ["member"]),

...(profile.specializations || [])

]

.join(" • ")


}


</div>






${

profile.contributor?.enabled

?

`

<br><br>

<div class="badge">

🌱 Contributor

</div>

`

:

""

}




${

isMyProfile(profile)

?

`

<br><br>

<button

class="btn btn-primary"

onclick="location.href='/profile-edit.html'">

✏ Edit Profile

</button>

`

:

""

}



</div>



</div>











<div class="profile-grid">







<div class="card">


<h2>

👋 About

</h2>


<p>

${

profile.bio ||

"No introduction added yet."

}

</p>


</div>









<div class="card">


<h2>

⭐ Reputation

</h2>


<div class="profile-grid">


<div class="stat">

<h2>${profile.stats?.reputation || 0}</h2>

<p>Points</p>

</div>



<div class="stat">

<h2>${profile.stats?.articles || 0}</h2>

<p>Articles</p>

</div>



<div class="stat">

<h2>${profile.stats?.answers || 0}</h2>

<p>Answers</p>

</div>



</div>


</div>









<div class="card">


<h2>

💼 Experience

</h2>


${

(profile.positions || []).length

?

profile.positions.map(job=>`

<p>

<b>${job.title || ""}</b>

<br>

${job.organization || ""}

</p>

`).join("")


:

"💼 No professional details shared yet."


}


</div>









<div class="card">


<h2>

🎓 Education

</h2>



${


(profile.education || []).length


?


profile.education.map(e=>`

<p>

${e.course || e.degree || ""}

${

e.curriculum

?

" - "+e.curriculum

:

""

}

</p>


`).join("")


:

"No education added yet."


}



<br>



<p>


${

(profile.specializations || [])

.join(", ")


}


</p>


</div>









<div class="card">


<h2>

🏅 Badges

</h2>


${

(profile.badges || []).length

?

profile.badges.join(" ")

:

"No badges earned yet."

}


</div>









<div class="card">


<h2>

🌐 Contact

</h2>



${

profile.contact?.email

?

`

<p>

Email:
${profile.contact.email.value}

</p>

`

:

""

}




${

profile.contact?.linkedin

?

`

<p>

LinkedIn:
${profile.contact.linkedin.value}

</p>

`

:

""

}



${

profile.contact?.website

?

`

<p>

Website:
${profile.contact.website.value}

</p>

`

:

""

}


</div>







</div>









<div class="card">


<h2>

📚 Contributions

</h2>


<div id="contribution-list">

Loading...

</div>


</div>








<div class="card">


<h2>

⚡ Recent Activity

</h2>


<div id="activity-list">

Loading...

</div>


</div>



`;









loadContributions(id);

loadActivity(id);



}









async function loadContributions(id){



const box =
document.getElementById(
"contribution-list"
);



if(!box){

return;

}



const data =
await getUserContributions(id);




box.innerHTML=`


<div class="profile-grid">


<div>

<h2>${data.articles.length}</h2>

<p>Articles</p>

</div>



<div>

<h2>${data.answers.length}</h2>

<p>Answers</p>

</div>




<div>

<h2>${data.notes.length}</h2>

<p>Notes</p>

</div>



<div>

<h2>${data.uploads.length}</h2>

<p>Uploads</p>

</div>


</div>


`;



}









async function loadActivity(id){



const box =
document.getElementById(
"activity-list"
);



if(!box){

return;

}





if(

typeof getProfileActivity !== "function"

){


box.innerHTML="No activity yet.";

return;


}





const activity =
await getProfileActivity(
id,
10
);





if(!activity.length){


box.innerHTML=

"No recent activity.";

return;


}





box.innerHTML =

activity

.map(a=>`


<div class="activity-item">


<b>

${a.action || ""}

</b>


<br>


${a.message || ""}


</div>


`)

.join("");



}




</script>




</body>


</html>
