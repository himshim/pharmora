<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Profile | Pharmora
</title>


<link rel="stylesheet" href="/css/pharmora.css">


<style>

.profile-header{

display:flex;
gap:25px;
align-items:center;
flex-wrap:wrap;

padding:25px;

background:
linear-gradient(
135deg,
var(--surface),
transparent
);

border-radius:20px;

}


.avatar{

width:100px;
height:100px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:2rem;
font-weight:bold;

background:var(--surface);
border:1px solid var(--border);

overflow:hidden;

box-shadow:
0 8px 30px rgba(0,0,0,.15);

transition:.3s;

}


.avatar img{

width:100%;
height:100%;
object-fit:cover;

}

.profile-header:hover .avatar{

transform:scale(1.05);

}


.profile-grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(250px,1fr)
);

gap:20px;

}


.stat{

text-align:center;

}


.activity-item{

padding:15px;

margin:10px 0;

border:

1px solid var(--border);

border-radius:15px;

transition:.2s;

}


.activity-item:hover{

transform:translateY(-3px);

box-shadow:
0 8px 20px rgba(0,0,0,.1);

}


</style>


</head>



<body>


<div id="site-header"></div>


<main class="container section">


<div id="profile-root">

Loading profile...

</div>


</main>


<div id="site-footer"></div>







<script src="/js/pharmora.js"></script>




<script>


window.addEventListener(

"pharmora-ready",

loadProfile

);

function isMyProfile(profile){

return (
currentUser()
&&
currentUser().id === profile.userId
);

}

function canSeeUserCode(profile){


let user =
currentUser();


if(!user){

return false;

}


return (

user.id === profile.userId

||

[
"owner",
"admin",
"moderator"
]
.includes(user.role)

||

(user.roles || [])
.some(r=>

[
"owner",
"admin",
"moderator"
]
.includes(r)

)

);


}

function platformBadge(profile){


let user =
currentUser();


if(
!user
||
user.id !== profile.userId
){

return "";

}



let roles = [

user.role,

...(user.roles || [])

];



if(
roles.includes("owner")
){

return "👑 Platform Owner";

}



if(
roles.includes("admin")
){

return "🛡 Administrator";

}



if(
roles.includes("moderator")
){

return "🛡 Moderator";

}



return "";


}




async function loadProfile(){



const root =
document.getElementById(
"profile-root"
);



const params =
new URLSearchParams(
location.search
);



const id =
params.get("id");





if(!id){


root.innerHTML=`


<div class="card">

<h2>Profile not found</h2>

</div>


`;


return;


}








const profile =
await getPublicProfile(
id
);





if(!profile){


root.innerHTML=`


<div class="card">

<h2>Profile unavailable</h2>

</div>


`;


return;


}








root.innerHTML = `
<style>
.profile-cover {
  height: 180px;
  background: linear-gradient(135deg, var(--primary-light, #2e1065) 0%, var(--surface-dark, #090514) 100%);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  margin-bottom: -50px;
}
.profile-header-card {
  position: relative;
  z-index: 2;
  margin-bottom: 24px;
}
.profile-avatar-container {
  position: relative;
  display: inline-block;
  margin-top: -30px;
  margin-bottom: 12px;
}
.profile-avatar {
  width: 100px;
  height: 100px;
  border-radius: 20px;
  background: var(--surface);
  border: 4px solid var(--surface-light);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: bold;
  overflow: hidden;
}
.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.badge-verification {
  position: absolute;
  bottom: -4px;
  right: -4px;
  background: #22c55e;
  color: #fff;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--surface-light);
  font-size: 0.8rem;
}
.profile-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 768px) {
  .profile-grid {
    grid-template-columns: 1fr;
  }
}
.profile-sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.profile-main-content {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.stat-pill {
  padding: 10px;
  border-radius: 10px;
  background: var(--surface-light);
  border: 1px solid var(--border);
  text-align: center;
}
.stat-pill h3 {
  font-size: 1.3rem;
  margin: 0 0 2px 0;
  color: var(--text);
}
.stat-pill p {
  margin: 0;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
}
.tab-nav {
  display: flex;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.tab-btn {
  padding: 8px 14px;
  border: none;
  background: none;
  color: var(--text-muted);
  font-weight: 600;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.tab-btn.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
/* Modal Styles */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active {
  display: flex;
}
.modal-container {
  width: 100%;
  max-width: 800px;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  position: relative;
}
.modal-close-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  background: var(--surface-light);
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
</style>

<div class="profile-cover"></div>

<div class="card profile-header-card">
  <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;">
    <div>
      <div class="profile-avatar-container">
        <div class="profile-avatar">
          \${profile.avatar?.url ? \`<img src="\${profile.avatar.url}" alt="Avatar">\` : (profile.avatar?.initials || 'PH')}
        </div>
        \${profile.verification?.verified ? \`<div class="badge-verification" title="Verified Specialist">✔</div>\` : ''}
      </div>
      
      <h1 style="margin: 0 0 2px 0; font-size: 1.6rem; display: flex; align-items: center; gap: 6px;">
        \${profile.displayName || 'Pharmora User'}
        \${platformBadge(profile) ? '👑' : ''}
      </h1>
      
      <p style="margin: 0 0 8px 0; color: var(--text-muted); font-size: 0.9rem;">
        \${profile.headline || 'Pharmora Community Member'}
      </p>

      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;">
        <span class="badge" style="background: var(--primary-light, #2e1065); color: #fff;">@\${profile.username || 'user'}</span>
        \${[...(profile.types || ['member']), ...(profile.specializations || [])].map(x => \`<span class="badge">\${x}</span>\`).join('')}
      </div>
    </div>

    <div>
      \${isMyProfile(profile) ? \`
        <button class="btn btn-primary" onclick="openProfileWizardModal()">
          ✏ Edit Workspace
        </button>
      \` : ''}
    </div>
  </div>
</div>

<div class="profile-grid">
  <!-- Sidebar Panel -->
  <div class="profile-sidebar">
    <div class="card">
      <h3 style="margin-top: 0; font-size: 1rem;">👋 About</h3>
      <p style="font-size: 0.85rem; line-height: 1.4; color: var(--text-muted); margin-bottom: 0;">
        \${profile.bio || 'No introduction added yet.'}
      </p>
    </div>

    <!-- Reputation & Engagement Stats -->
    <div class="card">
      <h3 style="margin-top: 0; font-size: 1rem;">📊 Statistics</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div class="stat-pill">
          <h3>\${profile.stats?.reputation || 0}</h3>
          <p>Reputation</p>
        </div>
        <div class="stat-pill">
          <h3>\${profile.stats?.articles || 0}</h3>
          <p>Articles</p>
        </div>
        <div class="stat-pill">
          <h3>\${profile.stats?.answers || 0}</h3>
          <p>Answers</p>
        </div>
        <div class="stat-pill">
          <h3>\${profile.stats?.notes || 0}</h3>
          <p>Notes</p>
        </div>
      </div>
    </div>

    <!-- Social Contacts Panel -->
    \${(profile.contact?.email?.visible || profile.contact?.linkedin?.value || profile.contact?.website?.value) ? \`
      <div class="card">
        <h3 style="margin-top: 0; font-size: 1rem;">🌐 Connections</h3>
        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem;">
          \${profile.contact?.email?.visible ? \`
            <div>
              <span style="color: var(--text-muted);">📧 Email:</span>
              <a href="mailto:\${profile.contact.email.value}" style="word-break: break-all;">\${profile.contact.email.value}</a>
            </div>
          \` : ''}
          \${profile.contact?.linkedin?.value ? \`
            <div>
              <span style="color: var(--text-muted);">🔗 LinkedIn:</span>
              <a href="\${profile.contact.linkedin.value}" target="_blank" rel="noopener">Profile</a>
            </div>
          \` : ''}
          \${profile.contact?.website?.value ? \`
            <div>
              <span style="color: var(--text-muted);">🖥 Website:</span>
              <a href="\${profile.contact.website.value}" target="_blank" rel="noopener">Visit Site</a>
            </div>
          \` : ''}
        </div>
      </div>
    \` : ''}
  </div>

  <!-- Main Content Tabs -->
  <div class="profile-main-content">
    <!-- Dynamic Panel (Role-Specific) -->
    \${profile.types?.[0] === 'student' ? \`
      <div class="card" style="border-left: 4px solid var(--primary);">
        <h3 style="margin-top: 0; color: var(--primary); font-size: 1rem;">🎓 Academic Track</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 0.85rem;">
          <div>
            <span style="color: var(--text-muted);">Institution:</span>
            <strong>\${profile.education?.[0]?.college || 'Not set'}</strong>
          </div>
          <div>
            <span style="color: var(--text-muted);">Course:</span>
            <strong>\${profile.education?.[0]?.course || 'Not set'}</strong>
          </div>
          <div>
            <span style="color: var(--text-muted);">Graduation Year:</span>
            <strong>\${profile.education?.[0]?.year || 'Not set'}</strong>
          </div>
        </div>
      </div>
    \` : \`
      <div class="card" style="border-left: 4px solid var(--primary);">
        <h3 style="margin-top: 0; color: var(--primary); font-size: 1rem;">💼 Practice & Experience</h3>
        <div style="font-size: 0.85rem; line-height: 1.5;">
          <div>
            <span style="color: var(--text-muted);">Current Role:</span>
            <strong>\${profile.positions?.[0]?.title || 'Member'}</strong>
          </div>
          <div>
            <span style="color: var(--text-muted);">Organization:</span>
            <strong>\${profile.positions?.[0]?.organization || 'Not set'}</strong>
          </div>
        </div>
      </div>
    \`}

    <div class="card">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchProfileTab('contributions')">📚 Contributions</button>
        <button class="tab-btn" onclick="switchProfileTab('activity')">⚡ Recent Activity</button>
        <button class="tab-btn" onclick="switchProfileTab('achievements')">🏅 Badges & Achievements</button>
      </div>

      <div id="tab-contributions" class="profile-tab-panel">
        <div id="contribution-list-wrapper"></div>
      </div>

      <div id="tab-activity" class="profile-tab-panel" style="display: none;">
        <div id="activity-list-wrapper"></div>
      </div>

      <div id="tab-achievements" class="profile-tab-panel" style="display: none;">
        <div style="display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;">
          \${renderAchievementsTab(profile)}
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Wizard Modal Overlay -->
<div id="profile-wizard-modal" class="modal-overlay">
  <div class="modal-container">
    <button class="modal-close-btn" onclick="closeProfileWizardModal()" aria-label="Close Editor">✖</button>
    <div style="padding: 20px;">
      <h2 style="margin-top: 0; margin-bottom: 16px;">✏ Workspace Setup Wizard</h2>
      <div id="profile-wizard-root">Loading Profile Wizard...</div>
    </div>
  </div>
</div>
\`;

window.openProfileWizardModal = function() {
  document.getElementById('profile-wizard-modal').classList.add('active');
  PharmoraProfileWizard.initWizard(profile);
};

window.closeProfileWizardModal = function() {
  document.getElementById('profile-wizard-modal').classList.remove('active');
};

window.switchProfileTab = function(tabName) {
  document.querySelectorAll('.profile-tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById('tab-' + tabName).style.display = 'block';
  event.target.classList.add('active');
};

window.renderAchievementsTab = function(profile) {
  const badges = profile.badges || [];
  if (badges.length > 0) {
    return badges.map(b => `<span class="badge" style="font-size: 0.9rem; padding: 6px 12px;">${b}</span>`).join('');
  }
  return `
    <div style="text-align: center; width: 100%; color: var(--text-muted); padding: 15px; font-size: 0.85rem;">
      🏅 No badges earned yet. Contribute content to acquire reputation milestones!
    </div>
  `;
};

// Aliasing wrapper ids for backwards-compatibility compatibility
const contBox = document.getElementById('contribution-list-wrapper');
if (contBox) {
  contBox.id = 'contribution-list';
}
const actBox = document.getElementById('activity-list-wrapper');
if (actBox) {
  actBox.id = 'activity-list';
}

loadContributions(id);
loadActivity(id);

}





async function loadContributions(id){


const box =
document.getElementById(
"contribution-list"
);


if(!box){

return;

}



const data =
await getUserContributions(id);



function renderItems(
title,
items,
icon
){


if(!items.length){

return `

<div>

<h3>
${icon} ${title}
</h3>

<p>No items yet.</p>

</div>

`;

}



return `

<div>

<h3>

${icon} ${title}
(${items.length})

</h3>


${

items.map(item=>`


<div class="activity-item">


<b>

${item.title || "Untitled"}

</b>


<br>


<small>

${item.createdAt || ""}

</small>


<br><br>


<a
class="btn"
href="${getContributionUrl(item,title)}">

Open →

</a>


${


currentUser()
&&
(
currentUser().id===item.userId

||

currentUser().id===item.ownership?.ownerId
)

?

`

<button
class="btn"
onclick="editContribution('${item.id}')">

Edit

</button>


<button
class="btn"
onclick="requestDelete('${item.id}')">

Remove

</button>

`

:

""

}


</div>


`).join("")

}


</div>

`;

}





box.innerHTML = `


<div class="profile-grid">


${renderItems(
"Articles",
data.articles || [],
"📄"
)}



${renderItems(
"Answers",
data.answers || [],
"💬"
)}



${renderItems(
"Notes",
data.notes || [],
"📘"
)}



${renderItems(
"Uploads",
data.uploads || [],
"📦"
)}


</div>


`;



}

function getContributionUrl(item,type){


if(item.url){

return item.url;

}


let base="/";


switch(
type.toLowerCase()
){


case "articles":

base="/library/view.html?id=";

break;



case "notes":

base="/library/view.html?id=";

break;



case "answers":

base="/community/?answer=";

break;



case "uploads":

base="/library/view.html?id=";

break;



default:

base="/library/view.html?id=";


}



return base + item.id;


}


function editContribution(id){


location.href =
"/contribute/?edit="+id;


}





function requestDelete(id){


alert(

"Delete request submitted for review."

);


/*

Future:

PharmoraReview.requestDelete(id)

*/


}




async function loadActivity(id){



const box =
document.getElementById(
"activity-list"
);



if(!box){

return;

}





if(

typeof getProfileActivity !== "function"

){


box.innerHTML="No activity yet.";

return;


}





const activity =
await getProfileActivity(
id,
10
);





if(!activity.length){


box.innerHTML=

`

⚡

<br>

No activity yet.

<br>

<small>

Community actions will appear here.

</small>

`;

return;


}





box.innerHTML =

activity

.map(a=>`


<div class="activity-item">


<b>

${a.action || ""}

</b>


<br>


${a.message || ""}


</div>


`)

.join("");



}




</script>




</body>


</html>
