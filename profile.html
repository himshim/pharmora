<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Profile | Pharmora
</title>


<link rel="stylesheet" href="/css/pharmora.css">


<style>

.profile-header{

display:flex;
gap:25px;
align-items:center;
flex-wrap:wrap;

padding:25px;

background:
linear-gradient(
135deg,
var(--surface),
transparent
);

border-radius:20px;

}


.avatar{

width:100px;
height:100px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:2rem;
font-weight:bold;

background:var(--surface);
border:1px solid var(--border);

overflow:hidden;

box-shadow:
0 8px 30px rgba(0,0,0,.15);

transition:.3s;

}


.avatar img{

width:100%;
height:100%;
object-fit:cover;

}

.profile-header:hover .avatar{

transform:scale(1.05);

}


.profile-grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(250px,1fr)
);

gap:20px;

}


.stat{

text-align:center;

}


.activity-item{

padding:15px;

margin:10px 0;

border:

1px solid var(--border);

border-radius:15px;

transition:.2s;

}


.activity-item:hover{

transform:translateY(-3px);

box-shadow:
0 8px 20px rgba(0,0,0,.1);

}


</style>


</head>



<body>


<div id="site-header"></div>


<main class="container section">


<div id="profile-root">

Loading profile...

</div>


</main>


<div id="site-footer"></div>







<script src="/js/pharmora.js"></script>




<script>


window.addEventListener(

"pharmora-ready",

loadProfile

);

function isMyProfile(profile){

return (
currentUser()
&&
currentUser().id === profile.userId
);

}

function canSeeUserCode(profile){


let user =
currentUser();


if(!user){

return false;

}


return (

user.id === profile.userId

||

[
"owner",
"admin",
"moderator"
]
.includes(user.role)

||

(user.roles || [])
.some(r=>

[
"owner",
"admin",
"moderator"
]
.includes(r)

)

);


}

function platformBadge(profile){


let user =
currentUser();


if(
!user
||
user.id !== profile.userId
){

return "";

}



let roles = [

user.role,

...(user.roles || [])

];



if(
roles.includes("owner")
){

return "👑 Platform Owner";

}



if(
roles.includes("admin")
){

return "🛡 Administrator";

}



if(
roles.includes("moderator")
){

return "🛡 Moderator";

}



return "";


}




async function loadProfile(){



const root =
document.getElementById(
"profile-root"
);



const params =
new URLSearchParams(
location.search
);



const id =
params.get("id");





if(!id){


root.innerHTML=`


<div class="card">

<h2>Profile not found</h2>

</div>


`;


return;


}








const profile =
await getPublicProfile(
id
);





if(!profile){


root.innerHTML=`


<div class="card">

<h2>Profile unavailable</h2>

</div>


`;


return;


}









root.innerHTML=`



<div class="card profile-header">



<div class="avatar">


${

profile.avatar?.url

?

`

<img src="${profile.avatar.url}">

`

:

(

profile.avatar?.initials ||

"PH"

)

}


</div>







<div>


<h1>


${profile.displayName || "Pharmora User"}


${

platformBadge(profile)

?

" 👑"

:

profile.verification?.verified

?

" ✔"

:

""

}


</h1>





<p>

${profile.headline || "Pharmora Community Member"}

</p>


<p>

@${profile.username || "user"}

${

canSeeUserCode(profile)

?

`

<br>

🔒 User Code:
${profile.publicId || profile.refId || ""}

`

:

""

}

</p>


${

platformBadge(profile)

?

`

<div class="badge">

${platformBadge(profile)}

</div>

`

:

""

}



<div>


${

[

...(profile.types || ["member"]),

...(profile.specializations || [])

]

.map(x=>`

<span class="badge">

${x}

</span>

`)

.join(" ")


}


</div>






${

profile.contributor?.enabled

?

`

<br><br>

<div class="badge">

🌱 Contributor

</div>

`

:

""

}




${

isMyProfile(profile)

?

`

<br><br>

<button

class="btn btn-primary"

onclick="location.href='/profile-edit.html'">

✏ Edit Profile

</button>

`

:

""

}



</div>



</div>











<div class="profile-grid">







<div class="card">


<h2>

👋 About

</h2>


<p>

${

profile.bio ||

"No introduction added yet."

}

</p>


</div>









<div class="card">


<h2>

⭐ Reputation

</h2>


<div class="profile-grid">


<div class="stat">

<h2>${profile.stats?.reputation || 0}</h2>

<p>Points</p>

</div>



<div class="stat">

<h2>${profile.stats?.articles || 0}</h2>

<p>Articles</p>

</div>



<div class="stat">

<h2>${profile.stats?.answers || 0}</h2>

<p>Answers</p>

</div>



</div>


</div>









<div class="card">


<h2>

💼 Experience

</h2>


${

(profile.positions || []).length

?

profile.positions.map(job=>`

<p>

<b>${job.title || ""}</b>

<br>

${job.organization || ""}

</p>

`).join("")


:

"💼 No professional details shared yet."


}


</div>









<div class="card">


<h2>

🎓 Education

</h2>



${


(profile.education || []).length


?


profile.education.map(e=>`

<p>

${e.course || e.degree || ""}

${

e.curriculum

?

" - "+e.curriculum

:

""

}

</p>


`).join("")


:

"No education added yet."


}



<br>



<p>


${

(profile.specializations || [])

.join(", ")


}


</p>


</div>









<div class="card">


<h2>

🏅 Badges

</h2>


${

(profile.badges || []).length

?

profile.badges.join(" ")

:

`

<div>

🏅

<br>

No badges yet.

<br>

<small>

Contribute to earn achievements.

</small>

</div>

`

}


</div>









${

(
profile.contact?.email?.value
||
profile.contact?.linkedin?.value
||
profile.contact?.website?.value
)

?

`

<div class="card">


<h2>

🌐 Contact

</h2>



${

profile.contact?.email

?

`

<p>

Email:
${profile.contact.email.value}

</p>

`

:

""

}




${

profile.contact?.linkedin

?

`

<p>

LinkedIn:
${profile.contact.linkedin.value}

</p>

`

:

""

}



${

profile.contact?.website

?

`

<p>

Website:
${profile.contact.website.value}

</p>

`

:

""

}


</div>



`

:

""

}



</div>









<div class="card">


<h2>

📚 Contributions

</h2>


<div id="contribution-list">

Loading...

</div>


</div>








<div class="card">


<h2>

⚡ Recent Activity

</h2>


<div id="activity-list">

Loading...

</div>


</div>



`;









loadContributions(id);

loadActivity(id);



}









async function loadContributions(id){


const box =
document.getElementById(
"contribution-list"
);


if(!box){

return;

}



const data =
await getUserContributions(id);



function renderItems(
title,
items,
icon
){


if(!items.length){

return `

<div>

<h3>
${icon} ${title}
</h3>

<p>No items yet.</p>

</div>

`;

}



return `

<div>

<h3>

${icon} ${title}
(${items.length})

</h3>


${

items.map(item=>`


<div class="activity-item">


<b>

${item.title || "Untitled"}

</b>


<br>


<small>

${item.createdAt || ""}

</small>


<br><br>


<a
class="btn"
href="${getContributionUrl(item,title)}">

Open →

</a>


${


currentUser()
&&
(
currentUser().id===item.userId

||

currentUser().id===item.ownership?.ownerId
)

?

`

<button
class="btn"
onclick="editContribution('${item.id}')">

Edit

</button>


<button
class="btn"
onclick="requestDelete('${item.id}')">

Remove

</button>

`

:

""

}


</div>


`).join("")

}


</div>

`;

}





box.innerHTML = `


<div class="profile-grid">


${renderItems(
"Articles",
data.articles || [],
"📄"
)}



${renderItems(
"Answers",
data.answers || [],
"💬"
)}



${renderItems(
"Notes",
data.notes || [],
"📘"
)}



${renderItems(
"Uploads",
data.uploads || [],
"📦"
)}


</div>


`;



}

function getContributionUrl(item,type){


if(item.url){

return item.url;

}


let base="/";


switch(
type.toLowerCase()
){


case "articles":

base="/library/view.html?id=";

break;



case "notes":

base="/library/view.html?id=";

break;



case "answers":

base="/community/?answer=";

break;



case "uploads":

base="/library/view.html?id=";

break;



default:

base="/library/view.html?id=";


}



return base + item.id;


}


function editContribution(id){


location.href =
"/contribute/?edit="+id;


}





function requestDelete(id){


alert(

"Delete request submitted for review."

);


/*

Future:

PharmoraReview.requestDelete(id)

*/


}




async function loadActivity(id){



const box =
document.getElementById(
"activity-list"
);



if(!box){

return;

}





if(

typeof getProfileActivity !== "function"

){


box.innerHTML="No activity yet.";

return;


}





const activity =
await getProfileActivity(
id,
10
);





if(!activity.length){


box.innerHTML=

`

⚡

<br>

No activity yet.

<br>

<small>

Community actions will appear here.

</small>

`;

return;


}





box.innerHTML =

activity

.map(a=>`


<div class="activity-item">


<b>

${a.action || ""}

</b>


<br>


${a.message || ""}


</div>


`)

.join("");



}




</script>




</body>


</html>
