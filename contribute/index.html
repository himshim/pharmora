<label>

<input

type="radio"

name="ctype"

value="events">

</label>






<label>

<input

type="radio"

name="ctype"

value="tools">

🧰 Tool


</label>





</div>

</div>

id="resource-link"

placeholder="External link (optional)">

id="resource-file"

type="file">

placeholder="Description / notes / explanation">

type="button"

<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>






<script src="../js/services/storage.service.js"></script>

<script src="../js/services/database.service.js"></script>

<script src="../js/services/auth.service.js"></script>

<script src="../js/services/analytics.service.js"></script>









<script>






const dynamicGroups=[

"courses",

"curriculums",

"semesters",

"subjects",

"categories",

"tags"

];









async function loadContributionOptions(){



let box =
document.getElementById(
"dynamic-fields"
);



box.innerHTML="";







for(

let group of dynamicGroups

){





let items=[];




try{


items =
await getRecords(
group
);



}

catch(e){


items=[];


}








box.innerHTML += `


<div class="option-box">


<h3>

${group}

</h3>

`;








if(

items.length===0

){


box.innerHTML += `


<small>

No ${group} added yet

</small>


`;



}









items.forEach(item=>{



box.innerHTML += `



<label>


<input

type="checkbox"

class="dynamic-${group}"

value="${item.name}">



${item.name}


</label>



`;



});







box.innerHTML +=

"</div>";



}



}











function selected(group){



return [

...document.querySelectorAll(

".dynamic-" + group + ":checked"

)

]

.map(

x=>x.value

);



}













async function submitContribution(){








let user =
currentUser();






if(!user){



alert(

"Login required before contribution"

);




location.href=

"../auth/login.html";



return;



}









let title =

document

.getElementById(

"resource-title"

)

.value

.trim();







let description =

document

.getElementById(

"resource-description"

)

.value

.trim();









let link =

document

.getElementById(

"resource-link"

)

.value

.trim();








let fileInput =

document.getElementById(

"resource-file"

);








if(!title){


alert(

"Enter title"

);


return;


}









let uploaded=null;








if(

fileInput.files.length>0

){





uploaded =
await uploadFile(

fileInput.files[0],

"uploads/"

);



}











if(

!uploaded

&&

!link

&&

!description

){





alert(

"Add file, link or description"

);




return;




}









let collection =

document.querySelector(

"input[name='ctype']:checked"

)

.value;









let contribution={




title:title,



description:description,





content:{


file:uploaded,


link:link


},







courses:

selected("courses"),





curriculums:

selected("curriculums"),





semesters:

selected("semesters"),





subjects:

selected("subjects"),





categories:

selected("categories"),





tags:

selected("tags"),








author:user,








review:{


comments:[]

},








stats:{


views:0,


downloads:0


},









status:

user.permissions?.includes(

"verified.creator"

)

?

"approved"

:

"pending"





};









let saved =

await createRecord(

collection,

contribution

);








console.log(

"Contribution saved:",

saved

);









if(

typeof trackEvent==="function"

){



trackEvent(

"contribution",

saved.id

);



}









alert(

"Submitted for review"

);









document

.getElementById(

"contribution-form"

)

.reset();






loadContributionOptions();





}









loadContributionOptions();






</script>








<script src="../js/app.js"></script>



</body>
