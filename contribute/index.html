<script>






const hierarchy=[

"courses",

"curriculums",

"semesters",

"subjects",

"units"

];









async function loadContributionOptions(){



let box =
document.getElementById(
"dynamic-fields"
);



box.innerHTML = `


<div class="option-box">


<h3>

Academic Classification

</h3>


<select id="select-course"
onchange="loadChildOptions('curriculums')">

<option value="">
Select Course
</option>

</select>




<select id="select-curriculum"
onchange="loadChildOptions('semesters')">

<option value="">
Select Curriculum
</option>

</select>




<select id="select-semester"
onchange="loadChildOptions('subjects')">

<option value="">
Select Semester / Year
</option>

</select>




<select id="select-subject"
onchange="loadChildOptions('units')">

<option value="">
Select Subject
</option>

</select>




<select id="select-unit">

<option value="">
Select Unit / Chapter (optional)
</option>

</select>


<br><br>


<input

id="resource-tags"

placeholder="Tags (comma separated)"

>


</div>


`;



loadChildOptions(
"courses"
);



}


async function loadChildOptions(type){



let map={

courses:"select-course",

curriculums:"select-curriculum",

semesters:"select-semester",

subjects:"select-subject",

units:"select-unit"

};




let records =
await getRecords(type);






if(type==="curriculums"){


let course =
document.getElementById(
"select-course"
).value;


records =
records.filter(x=>x.course===course);


}





if(type==="semesters"){


let curriculum =
document.getElementById(
"select-curriculum"
).value;


records =
records.filter(x=>x.curriculum===curriculum);


}





if(type==="subjects"){


let semester =
document.getElementById(
"select-semester"
).value;


records =
records.filter(x=>x.semester===semester);


}






if(type==="units"){


let subject =
document.getElementById(
"select-subject"
).value;


records =
records.filter(x=>x.subject===subject);


}







let select =
document.getElementById(
map[type]
);





select.innerHTML =

`
<option value="">

Select

</option>
`;





records.forEach(item=>{


select.innerHTML += `

<option value="${item.id}">

${

item.name ||

item.title ||

item.code

}

</option>

`;


});



}






















async function submitContribution(){








let user =
currentUser();






if(!user){



showToast(
"Login required",
"error"
);




location.href=

"../auth/login.html";



return;



}









let title =

document

.getElementById(

"resource-title"

)

.value

.trim();







let description =

document

.getElementById(

"resource-description"

)

.value

.trim();









let link =

document

.getElementById(

"resource-link"

)

.value

.trim();








let fileInput =

document.getElementById(

"resource-file"

);








if(!title){


showToast(

"Enter title"

);


return;


}









let uploaded=null;








if(

fileInput.files.length>0

){





uploaded =
await uploadFile(

fileInput.files[0],

"uploads/"

);



}











if(

!uploaded

&&

!link

&&

!description

){





showToast(

"Add file, link or description"

);




return;




}









let collection =

document.querySelector(

"input[name='ctype']:checked"

)

.value;









let contribution={




title:title,



description:description,





content:{


file:uploaded,


link:link


},







course:

document.getElementById(
"select-course"
).value,


curriculum:

document.getElementById(
"select-curriculum"
).value,


semester:

document.getElementById(
"select-semester"
).value,


subject:

document.getElementById(
"select-subject"
).value,


unit:

document.getElementById(
"select-unit"
).value,


tags:

document

.getElementById(
"resource-tags"
)

.value

.split(",")

.map(x=>x.trim())

.filter(Boolean),








author:user,








review:{


comments:[]

},








stats:{


views:0,


downloads:0


},









status:

user.permissions?.includes(

"verified.creator"

)

?

"approved"

:

"pending"





};









let saved =

await createRecord(

collection,

contribution

);








console.log(

"Contribution saved:",

saved

);









if(

typeof trackEvent==="function"

){



trackEvent(

"contribution",

saved.id

);



}









showToast(

"Submitted for review"

);









document

.getElementById(

"contribution-form"

)

.reset();






loadContributionOptions();





}









loadContributionOptions();






</script>
