<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Contribute
</title>


<link rel="icon" href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">


<style>


.hero{

text-align:center;

padding:60px 0;

}


.form-box{

max-width:700px;

margin:auto;

}


select,
textarea,
input{

width:100%;

padding:15px;

margin-bottom:15px;

border-radius:15px;

background:var(--surface);

color:var(--text);

border:1px solid var(--border);

outline:none;

}


textarea{

min-height:130px;

}


</style>


</head>




<body>



<div id="site-header"></div>





<main>





<section class="container hero">


<div class="badge">

🌱 Open Contribution

</div>



<h1>

Build Knowledge Together

</h1>



<p>

Share educational resources and help create an open learning ecosystem.

</p>


</section>








<section class="container section">



<div class="card form-box">




<h2>

Submit Resource

</h2>


<br>



<form id="contribution-form">




<input 
id="resource-title"
placeholder="Resource title">






<select id="resource-course">


<option>

Select Course

</option>


<option>B.Pharm</option>

<option>D.Pharm</option>

<option>M.Pharm</option>

<option>Pharm.D</option>


</select>







<select id="resource-type">


<option>

Contribution Type

</option>


<option>Study Notes</option>

<option>Presentation</option>

<option>Question Bank</option>

<option>Practical File</option>

<option>Teaching Material</option>

<option>Tool Suggestion</option>


</select>







<select id="contributor-role">


<option>

Contributor Role

</option>


<option>Student</option>

<option>Educator</option>

<option>Professional</option>


</select>







<input
id="resource-file"
type="file">







<textarea

id="resource-description"

placeholder="Describe your contribution...">


</textarea>








<button

type="button"

onclick="submitContribution()"

class="btn btn-primary">


Submit Contribution


</button>




</form>



</div>



</section>









<section class="container section">


<h2 class="section-title">

Contribution Process

</h2>





<div class="grid">





<div class="card">

<h2>📤 Submit</h2>

<p>

Share learning resources.

</p>

</div>







<div class="card">

<h2>🛡 Review</h2>

<p>

Moderation improves quality and accuracy.

</p>

</div>








<div class="card">

<h2>🌍 Publish</h2>

<p>

Approved content becomes available.

</p>

</div>




</div>


</section>





</main>





<div id="site-footer"></div>








<script src="../components/layout/header.js"></script>

<script src="../components/layout/footer.js"></script>



<script src="../js/services/storage.service.js"></script>

<script src="../js/services/analytics.service.js"></script>





<script>


async function submitContribution(){



let title =
document.getElementById(
"resource-title"
).value;




let fileInput =
document.getElementById(
"resource-file"
);





if(
title.trim()===""
){


alert(
"Please enter resource title"
);


return;


}





if(
fileInput.files.length===0
){


alert(
"Please select a file"
);


return;


}







let uploaded =
await uploadFile(

fileInput.files[0],

"resources/"

);








let contribution = {


title:title,


course:
document.getElementById(
"resource-course"
).value,


type:
document.getElementById(
"resource-type"
).value,


description:
document.getElementById(
"resource-description"
).value,


file:uploaded,


status:"pending"


};







console.log(

"Contribution Created:",

contribution

);








if(
typeof trackEvent==="function"
){


trackEvent(

"resource_submit",

title

);


}








alert(

"Contribution submitted for review"

);



document

.getElementById(
"contribution-form"
)

.reset();




}



</script>







<script src="../js/app.js"></script>



</body>

</html>
