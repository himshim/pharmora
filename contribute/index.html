<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Contribute | Pharmora
</title>


<link rel="icon" href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">


<style>

.form-box{

max-width:700px;

margin:auto;

}


select,textarea{

width:100%;

padding:15px;

margin-bottom:15px;

border-radius:15px;

background:var(--surface);

color:var(--text);

border:1px solid var(--border);

}


textarea{

min-height:130px;

}

</style>


</head>





<body>



<header class="container">


<nav class="navbar">


<a href="../" class="logo">


<img
src="../assets/branding/logo.svg"
height="32"
style="vertical-align:middle;">


Pharmora


</a>


<div class="nav-links">


<a href="../learn/">Learn</a>

<a href="../teach/">Teach</a>

<a href="../community/">Community</a>


</div>


</nav>


</header>








<main>



<section class="container section">


<div class="badge">

🌱 Open Contribution

</div>



<h1>

Build Pharmacy Knowledge Together

</h1>



<p>

Submit educational resources and help improve Pharmora.

</p>


</section>









<section class="container section">


<div class="card form-box">



<h2>

Submit Resource

</h2>


<br>



<select>

<option>

Select Course

</option>

<option>B.Pharm</option>

<option>D.Pharm</option>

<option>M.Pharm</option>

<option>Pharm.D</option>


</select>





<select>

<option>

Resource Type

</option>


<option>Notes</option>

<option>PPT</option>

<option>MCQ</option>

<option>Teacher Material</option>


</select>






<textarea placeholder="Describe your contribution...">


</textarea>





<button class="btn btn-primary">


Submit (Prototype)


</button>




</div>



</section>








<section class="container section">


<div class="card">


<h2>

🛡 Review Process

</h2>



<p>

All educational contributions will be reviewed before becoming verified resources.

</p>



</div>


</section>




</main>



</body>


</html>
