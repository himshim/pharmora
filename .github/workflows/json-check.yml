name: Pharmora JSON Check


on:

  push:

    paths:

      - "data/**/*.json"


  pull_request:

    paths:

      - "data/**/*.json"




jobs:


  validate-json:


    runs-on: ubuntu-latest



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4




      - name: Validate JSON files

        run: |

          echo "Checking Pharmora data files..."

          find data -name "*.json" -print0 | while read -d $'\0' file

          do

            echo "Checking $file"

            python -m json.tool "$file" > /dev/null

          done


          echo "All JSON files are valid"