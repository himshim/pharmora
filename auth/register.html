<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport" 
content="width=device-width, initial-scale=1.0"
>

<title>
Join Pharmora
</title>


<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">


<style>


.register-page{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}



.register-box{

width:100%;

max-width:500px;

}



.brand{

text-align:center;

font-size:2.3rem;

font-weight:900;

margin-bottom:20px;


background:

linear-gradient(
90deg,
var(--primary),
var(--secondary)
);


-webkit-background-clip:text;

color:transparent;

}




.form-card{

background:

rgba(15,23,42,.85);


border:

1px solid var(--border);


border-radius:

var(--radius-large);


padding:35px;


box-shadow:

var(--shadow);

}



.form-card h1,
.form-card p{

text-align:center;

}



.form-card p{

margin:

12px 0 30px;

}



.field{

margin-bottom:18px;

}



.field label{

display:block;

margin-bottom:8px;

color:

var(--text-soft);

}



.field input{

width:100%;

padding:15px;

border-radius:15px;

border:

1px solid var(--border);


background:

var(--surface);


color:

var(--text);

outline:none;

}




.roles{

display:grid;

grid-template-columns:

repeat(2,1fr);

gap:12px;

margin:

20px 0;

}



.role-card{

padding:18px;

border-radius:18px;

background:

var(--surface);


border:

1px solid var(--border);


text-align:center;

transition:

var(--transition);

}



.role-card:hover{

border-color:

var(--primary);


transform:

translateY(-3px);

}



.login-text{

text-align:center;

margin-top:20px;

}



.login-text a{

color:

var(--primary);

}



</style>


</head>




<body>



<div class="register-page">



<div class="register-box">



<div class="brand">

⚕ Pharmora

</div>






<div class="form-card">



<h1>

Create Account

</h1>



<p>

Join the open pharmacy knowledge community

</p>





<div class="field">


<label>

Name

</label>


<input placeholder="Your name">


</div>





<div class="field">


<label>

Email

</label>


<input

type="email"

placeholder="your@email.com"

>


</div>





<div class="field">


<label>

Password

</label>


<input

type="password"

placeholder="Create password"

>


</div>





<p>

I am joining as

</p>




<div class="roles">


<div class="role-card">

🎓

<br>

Student

</div>



<div class="role-card">

👨‍🏫

<br>

Teacher

</div>



<div class="role-card">

💊

<br>

Professional

</div>



<div class="role-card">

🌱

<br>

Contributor

</div>


</div>





<a 
href="onboarding.html"
class="btn btn-primary"
style="width:100%;">

Join Pharmora

</a>





<div class="login-text">


Already a member?

<a href="login.html">

Login

</a>


</div>






</div>


</div>



</div>





<script src="../js/app.js"></script>



</body>


</html>
