<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport" 
content="width=device-width, initial-scale=1.0">


<title>

Register

</title>


<link 
rel="icon"
href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">



<style>


.register-page{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}





.register-box{

width:100%;

max-width:500px;

}





.brand{

text-align:center;

font-size:2.3rem;

font-weight:900;

margin-bottom:20px;


background:

linear-gradient(
90deg,
var(--primary),
var(--secondary)
);


-webkit-background-clip:text;

color:transparent;

}






.form-card{

background:rgba(15,23,42,.85);

border:1px solid var(--border);

border-radius:var(--radius-large);

padding:35px;

box-shadow:var(--shadow);

}







.form-card h1,
.form-card p{

text-align:center;

}





.form-card p{

margin:12px 0 25px;

}





.field{

margin-bottom:18px;

}





.field label{

display:block;

margin-bottom:8px;

color:var(--text-soft);

}






.field input{

width:100%;

padding:15px;

border-radius:15px;

border:1px solid var(--border);

background:var(--surface);

color:var(--text);

outline:none;

}






.roles{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:12px;

margin:20px 0;

}







.role-card{

padding:18px;

border-radius:18px;

background:var(--surface);

border:1px solid var(--border);

text-align:center;

transition:var(--transition);

cursor:pointer;

}







.role-card:hover{

border-color:var(--primary);

transform:translateY(-3px);

}






.login-text{

text-align:center;

margin-top:20px;

}




.login-text a{

color:var(--primary);

}




</style>


</head>









<body>









<div class="register-page">







<div class="register-box">









<a 

href="../"

style="text-decoration:none;">





<div 

class="brand"

id="auth-brand">



⚕ Platform



</div>





</a>












<div class="form-card">









<h1>

Create Account

</h1>








<p>

Join the knowledge community

</p>










<form id="register-form">







<div class="field">




<label>

Name

</label>






<input 

id="name"

placeholder="Your name">





</div>









<div class="field">





<label>

Email

</label>







<input

id="email"

type="email"

placeholder="your@email.com">





</div>











<div class="field">






<label>

Password

</label>







<input

id="password"

type="password"

placeholder="Create password">






</div>









<p>

Tell us about yourself

</p>











<div class="roles">







<div 
class="role-card"
data-type="student">



🎓

<br>

Student



</div>









<div 
class="role-card"
data-role="educator">



👨‍🏫

<br>

Educator



</div>










<div 
class="role-card"
data-role="professional">



💊

<br>

Professional



</div>




















</div>









<button

type="button"

onclick="handleRegister()"

class="btn btn-primary"

style="width:100%;">



Create Account



</button>







</form>









<div class="login-text">





Already a member?




<a href="login.html">



Login



</a>







</div>








</div>






</div>






</div>









<script>


fetch("../config/site.json")

.then(r=>r.json())

.then(site=>{


document.getElementById("auth-brand").innerHTML =

"⚕ " + site.name;


});


</script>



<script src="../js/services/profile.service.js"></script>

<script src="../js/services/auth.service.js"></script>

<script>


let selectedTypes =
[
"student"
];





document

.querySelectorAll(
".role-card"
)

.forEach(card=>{


card.onclick=()=>{


let type =
card.dataset.type;



card.classList.toggle(
"active"
);



if(
selectedTypes.includes(type)
){


selectedTypes =
selectedTypes.filter(
x=>x!==type
);


}

else{


selectedTypes.push(type);


}



};


});









async function handleRegister(){





let user =
await registerUser({



name:
document.getElementById(
"name"
).value,



email:
document.getElementById(
"email"
).value,



password:
document.getElementById(
"password"
).value,



role:"member"



});

let profile =
await getProfile(
user.id
);



if(profile){



await updateRecord(

"profiles",

profile.id,

{


types:selectedTypes


}

);



}







if(
user &&
typeof trackEvent==="function"
){



trackEvent(

"register",

user.id

);



}









location.href="onboarding.html";



}



</script>

<script src="../js/app.js"></script>







</body>


</html>
