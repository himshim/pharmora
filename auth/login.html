<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport" 
content="width=device-width, initial-scale=1.0">


<title>

Login

</title>


<link 
rel="icon"
href="../assets/branding/favicon.svg">


<link rel="stylesheet" href="../css/variables.css">

<link rel="stylesheet" href="../css/base.css">

<link rel="stylesheet" href="../css/components.css">

<link rel="stylesheet" href="../css/responsive.css">



<style>


.auth-page{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}



.auth-box{

width:100%;

max-width:430px;

}




.auth-logo{

text-align:center;

font-size:2.3rem;

font-weight:900;

margin-bottom:20px;


background:

linear-gradient(
90deg,
var(--primary),
var(--secondary)
);


-webkit-background-clip:text;

color:transparent;

}




.auth-card{

padding:35px;

border-radius:var(--radius-large);

background:rgba(15,23,42,.85);

border:1px solid var(--border);

box-shadow:var(--shadow);

}





.auth-card h1{

text-align:center;

margin-bottom:12px;

}




.auth-card p{

text-align:center;

margin-bottom:25px;

}





.input-group{

margin-bottom:18px;

}





.input-group label{

display:block;

margin-bottom:8px;

color:var(--text-soft);

}





.input-group input{

width:100%;

padding:15px;

border-radius:15px;

border:1px solid var(--border);

background:var(--surface);

color:var(--text);

outline:none;

}





.auth-links{

display:flex;

justify-content:space-between;

font-size:.9rem;

margin-top:20px;

}





.role-box{

margin-top:25px;

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}





.role{

padding:15px;

border-radius:15px;

background:var(--surface);

text-align:center;

border:1px solid var(--border);

transition:var(--transition);

}




.role:hover{

border-color:var(--primary);

}





.footer-text{

margin-top:25px;

text-align:center;

font-size:.9rem;

color:var(--text-muted);

}



</style>


</head>








<body>








<div class="auth-page">





<div class="auth-box">








<a href="../"
style="text-decoration:none;">



<div 
class="auth-logo"
id="auth-brand">

⚕ Platform

</div>




</a>










<div class="auth-card">







<h1>

Welcome Back

</h1>







<p>

Continue your learning journey

</p>










<form id="login-form">







<div class="input-group">



<label>

Email

</label>





<input

id="email"

type="email"

placeholder="your@email.com">





</div>












<div class="input-group">





<label>

Password

</label>





<input

id="password"

type="password"

placeholder="••••••••">





</div>












<button

type="button"

onclick="handleLogin()"

class="btn btn-primary"

style="width:100%;">



Continue



</button>







</form>









<div class="auth-links">






<a>

Forgot password?

</a>






<a href="register.html">


Create account


</a>






</div>









<div class="role-box">






<div class="role">


🎓 Learner


</div>







<div class="role">


🌱 Contributor


</div>







</div>








</div>











<div class="footer-text">



Open • Collaborative • Accessible



</div>









</div>




</div>










<script>


fetch("../config/site.json")

.then(r=>r.json())

.then(site=>{


document.getElementById("auth-brand").innerHTML =

"⚕ " + site.name;


});


</script>


<script>


async function handleLogin(){



let email =
document.getElementById(
"email"
).value;




let password =
document.getElementById(
"password"
).value;





if(
email.trim()==="" ||
password.trim()===""
){


showToast(
"Enter email and password"
);


return;


}






let user =
await loginUser(

email,

password

);






if(
typeof trackEvent==="function"
){


trackEvent(

"login",

user.id

);


}






location.href="../dashboard/";



}



</script>

<script src="/js/pharmora.js"></script>






</body>


</html>
