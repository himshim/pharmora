<!DOCTYPE html>

<html lang="en">

<head>

<base href="/">

<meta charset="UTF-8">


<meta
name="viewport"
content="width=device-width, initial-scale=1.0">



<title>

Pharmora | Open Pharmacy Learning Network

</title>





<meta
name="description"
content="Pharmora is an open collaborative pharmacy learning platform for students, teachers, professionals and contributors.">


<meta
name="keywords"
content="Pharmacy, B.Pharm, D.Pharm, PharmD, M.Pharm, Pharmacy Notes, Pharmacy Education, PCI Curriculum">


<meta
name="author"
content="Pharmora Community">


<meta
name="robots"
content="index, follow">



<link
rel="canonical"
href="https://pharmora.netlify.app/">








<!-- PWA -->


<link
rel="manifest"
href="manifest.json">


<meta
name="theme-color"
content="#22d3ee">


<meta
name="mobile-web-app-capable"
content="yes">


<meta
name="apple-mobile-web-app-capable"
content="yes">


<meta
name="apple-mobile-web-app-title"
content="Pharmora">








<!-- Open Graph -->


<meta
property="og:title"
content="Pharmora - Open Pharmacy Learning Network">


<meta
property="og:description"
content="Open collaborative pharmacy education platform for students, teachers and professionals.">


<meta
property="og:type"
content="website">


<meta
property="og:url"
content="https://pharmora.netlify.app/">


<meta
property="og:image"
content="https://pharmora.netlify.app/assets/branding/logo.svg">








<!-- Twitter / Social -->


<meta
name="twitter:card"
content="summary_large_image">


<meta
name="twitter:title"
content="Pharmora - Open Pharmacy Learning Network">


<meta
name="twitter:description"
content="Learn, teach and contribute pharmacy knowledge openly.">







<!-- Icons -->


<link
rel="icon"
href="assets/branding/favicon.svg">


<link
rel="apple-touch-icon"
href="/assets/branding/icon-192.png">








<!-- Styles -->


<link rel="stylesheet" href="css/variables.css">

<link rel="stylesheet" href="css/base.css">

<link rel="stylesheet" href="css/components.css">

<link rel="stylesheet" href="css/responsive.css">


</head>




<body>




<div id="site-header"></div>


<main data-requires="notifications">


<section class="container hero">


<div class="badge">

🌱 Open Source Pharmacy Platform

</div>


<h1>

The Future of Pharmacy Learning

</h1>


<p>

Learn • Research • Share • Grow

</p>


<div class="search-box">

<input
placeholder="Search Pharmora..."
oninput="pharmoraSearch(this.value)"
>

</div>


<div
id="search-results"
class="grid">

</div>


</section>






<section class="container section">


<h2 class="section-title">

📊 Platform Growth

</h2>


<div
class="grid"
id="home-stats"
data-render="stats">

</div>


</section>







<section class="container section">


<h2 class="section-title">

🔥 Trending

</h2>


<div
class="grid"
id="trending-content"
data-render="home-content"
data-mode="trending">

</div>


</section>







<section class="container section">


<h2 class="section-title">

✨ Recently Added

</h2>


<div
class="grid"
id="latest-content"
data-render="home-content"
data-mode="latest">

</div>


</section>






<section class="container section">


<div class="card">


<h2>

🚀 Built Openly

</h2>


<p>

A collaborative pharmacy ecosystem.

</p>


</div>


</section>




</main>



<div id="site-footer"></div>



<script src="/js/pharmora.js"></script>




</body>

</html>
